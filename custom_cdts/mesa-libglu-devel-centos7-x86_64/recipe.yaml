schema_version: 1

# TODO: hack to workaround https://github.com/conda-forge/rattler-build-conda-compat/issues/112
context:
  cdt_build_number: 111
  distro: centos7

package:
  name: mesa-libglu-devel-conda-x86_64
  version: 9.0.0

source:
  - url: https://vault.centos.org/7.9.2009/os/x86_64/Packages/mesa-libGLU-devel-9.0.0-4.el7.x86_64.rpm
    sha256: 16a6d263808c9fdce8fd2a8485bcf6573ff6c32921528dd2eb0d57d4351bae29
    target_directory: binary
  # - url: https://vault.centos.org/7.9.2009/os/Source/SPackages/mesa-libGLU-9.0.0-4.el7.src.rpm
  #   target_directory: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: distro != "centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - '*'

requirements:
  build:
    - mesa-khr-devel-conda-x86_64 ==18.3.4 *_${{ cdt_build_number|int + 1000 }}
    - mesa-libglu-conda-x86_64 ==9.0.0 *_${{ cdt_build_number|int + 1000 }}
    - libarchive
  host:
    - mesa-khr-devel-conda-x86_64 ==18.3.4 *_${{ cdt_build_number|int + 1000 }}
    - mesa-libglu-conda-x86_64 ==9.0.0 *_${{ cdt_build_number|int + 1000 }}
    - sysroot_linux-64 2.17.*
  run:
    - mesa-khr-devel-conda-x86_64 ==18.3.4 *_${{ cdt_build_number|int + 1000 }}
    - mesa-libglu-conda-x86_64 ==9.0.0 *_${{ cdt_build_number|int + 1000 }}
    - sysroot_linux-64 2.17.*

tests:
  - script:
      - echo "it installs!"

about:
  homepage: http://mesa3d.org/
  license: MIT
  license_file: mesa-license
  summary: (CDT) Development files for mesa-libGLU
  description: |
    The mesa-libGLU-devel package contains libraries and header files for
    developing applications that use mesa-libGLU.

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
