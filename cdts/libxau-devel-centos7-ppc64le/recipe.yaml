schema_version: 1

# TODO: hack to workaround https://github.com/conda-forge/rattler-build-conda-compat/issues/112
context:
  cdt_build_number: 111
  distro: centos7

package:
  name: libxau-devel-conda-ppc64le
  version: 1.0.8

source:
  - url: https://vault.centos.org/altarch/7.9.2009/os/ppc64le/Packages/libXau-devel-1.0.8-2.1.el7.ppc64le.rpm
    sha256: 9a6d3a9a801c238a13f5fd4f9ad31d5f3c82824b8d6949523e85b7e915b6588e
    target_directory: binary
  # - url: https://vault.centos.org/altarch/7.9.2009/os/Source/SPackages/libXau-1.0.8-2.1.el7.src.rpm
  #   target_directory: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: distro != "centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - '*'

requirements:
  build:
    - libxau-conda-ppc64le ==1.0.8 *_${{ cdt_build_number|int + 1000 }}
    - libarchive
  host:
    - libxau-conda-ppc64le ==1.0.8 *_${{ cdt_build_number|int + 1000 }}
    - sysroot_linux-ppc64le 2.17.*
  run:
    - libxau-conda-ppc64le ==1.0.8 *_${{ cdt_build_number|int + 1000 }}
    - sysroot_linux-ppc64le 2.17.*

tests:
  - script:
      - echo "it installs!"

about:
  homepage: http://www.x.org
  license: MIT
  license_file: libxau-license
  summary: (CDT) Development files for libXau
  description: |
    X.Org X11 libXau development package

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
