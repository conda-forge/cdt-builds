schema_version: 1

# TODO: hack to workaround https://github.com/conda-forge/rattler-build-conda-compat/issues/112
context:
  cdt_build_number: 111
  distro: centos7

package:
  name: numactl-devel-conda-x86_64
  version: 2.0.12

source:
  - url: https://vault.centos.org/7.9.2009/os/x86_64/Packages/numactl-devel-2.0.12-5.el7.x86_64.rpm
    sha256: 11c48961d93dbcbef519b2d50df43198c572e3a8a335d62ebc1e5f6307d948e5
    target_directory: binary
  # - url: https://vault.centos.org/7.9.2009/os/Source/SPackages/numactl-2.0.12-5.el7.src.rpm
  #   target_directory: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: distro != "centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - '*'

requirements:
  build:
    - numactl-libs-conda-x86_64 ==2.0.12 *_${{ cdt_build_number|int + 1000 }}
    - libarchive
  host:
    - numactl-libs-conda-x86_64 ==2.0.12 *_${{ cdt_build_number|int + 1000 }}
    - sysroot_linux-64 2.17.*
  run:
    - numactl-libs-conda-x86_64 ==2.0.12 *_${{ cdt_build_number|int + 1000 }}
    - sysroot_linux-64 2.17.*

tests:
  - script:
      - echo "it installs!"

about:
  homepage: https://github.com/numactl/numactl
  license: LGPL-2.0-only AND GPL-2.0-only
  license_file:
    - numactl-copyright.txt
    - numactl-gpl2.txt
    - numactl-lgpl2.txt
  summary: (CDT) Development package for building Applications that use numa
  description: |
    Provides development headers for numa library calls

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
