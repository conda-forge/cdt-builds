schema_version: 1

# TODO: hack to workaround https://github.com/conda-forge/rattler-build-conda-compat/issues/112
context:
  cdt_build_number: 111
  distro: alma8

package:
  name: mesa-libgbm-conda-ppc64le
  version: 23.1.4

source:
  - url: https://repo.almalinux.org/almalinux/8.10/AppStream/ppc64le/os/Packages/mesa-libgbm-23.1.4-4.el8_10.alma.1.ppc64le.rpm
    sha256: 5906132d1c223198219b248974389dac6fc5ac0bcbabfa1eb4fc362cc25dc5e6
    target_directory: binary
  # - url: https://repo.almalinux.org/almalinux/8.10/AppStream/Source/Packages/mesa-23.1.4-4.el8_10.alma.1.src.rpm
  #   target_directory: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: distro != "alma8"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - '*'

requirements:
  build:
    - libarchive
  host:
    - sysroot_linux-ppc64le 2.28.*
  run:
    - sysroot_linux-ppc64le 2.28.*

tests:
  - script:
      - echo "it installs!"

about:
  homepage: http://www.mesa3d.org
  license: MIT
  license_file: mesa-license
  summary: (CDT) Mesa gbm runtime library
  description: |
    Mesa gbm runtime library.

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
