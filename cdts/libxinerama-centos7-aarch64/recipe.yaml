schema_version: 1

package:
  name: libxinerama-conda-aarch64
  version: 1.1.3

source:
  - url: https://vault.centos.org/altarch/7.9.2009/os/aarch64/Packages/libXinerama-1.1.3-2.1.el7.aarch64.rpm
    sha256: 2b1e4d730954ab7e85550841938eefdaea0dc6e8b4509e2773b9b90d1b5dbc36
    target_directory: binary
    no_hoist: true
  # - url: https://vault.centos.org/altarch/7.9.2009/os/Source/SPackages/libXinerama-1.1.3-2.1.el7.src.rpm
  #   no_hoist: true
  #   folder: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: "distro != "\centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - "*"

requirements:
  build:
    - libx11-conda-aarch64 >=1.5.99.902 *_{{ cdt_build_number|int + 1000 }}
  host:
    - libx11-conda-aarch64 >=1.5.99.902 *_{{ cdt_build_number|int + 1000 }}
    - sysroot_linux-aarch64 2.17.*
  run:
    - libx11-conda-aarch64 >=1.5.99.902 *_{{ cdt_build_number|int + 1000 }}
    - sysroot_linux-aarch64 2.17.*

tests:
  script:
    - "echo "it installs!""

about:
  license: MIT
  license_file: {{ SRC_DIR }}/binary/usr/share/doc/libXinerama-1.1.3/COPYING
  summary: (CDT) X.Org X11 libXinerama runtime library
  description: |
        X.Org X11 libXinerama runtime library


  homepage: http://www.x.org

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
