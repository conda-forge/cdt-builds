schema_version: 1

# TODO: hack to workaround https://github.com/conda-forge/rattler-build-conda-compat/issues/112
context:
  cdt_build_number: 111
  distro: centos7

package:
  name: expat-devel-conda-x86_64
  version: 2.1.0

source:
  - url: https://vault.centos.org/7.9.2009/os/x86_64/Packages/expat-devel-2.1.0-12.el7.x86_64.rpm
    sha256: a9f6672cc1643c21d9689685c9bae287909204e8cd6eb12be11bd438679b82b0
    target_directory: binary
  # - url: https://vault.centos.org/7.9.2009/os/Source/SPackages/expat-2.1.0-12.el7.src.rpm
  #   target_directory: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: distro != "centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - '*'

requirements:
  build:
    - expat-conda-x86_64 ==2.1.0 *_${{ cdt_build_number|int + 1000 }}
    - libarchive
  host:
    - expat-conda-x86_64 ==2.1.0 *_${{ cdt_build_number|int + 1000 }}
    - sysroot_linux-64 2.17.*
  run:
    - expat-conda-x86_64 ==2.1.0 *_${{ cdt_build_number|int + 1000 }}
    - sysroot_linux-64 2.17.*

tests:
  - script:
      - echo "it installs!"

about:
  homepage: http://www.libexpat.org/
  license: MIT
  license_file: expat-license
  summary: (CDT) Libraries and header files to develop applications using expat
  description: |
    The expat-devel package contains the libraries, include files and
    documentation to develop XML applications with expat.

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
