schema_version: 1

package:
  name: libxrender-devel-conda-ppc64le
  version: 0.9.10

source:
  - url: https://vault.centos.org/altarch/7.9.2009/os/ppc64le/Packages/libXrender-devel-0.9.10-1.el7.ppc64le.rpm
    sha256: 93705a982fc458eb8fefb92b82cef721110916636092cecf745800a60c497cdf
    target_directory: binary
    no_hoist: true
  # - url: https://vault.centos.org/altarch/7.9.2009/os/Source/SPackages/libXrender-0.9.10-1.el7.src.rpm
  #   no_hoist: true
  #   folder: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: "distro != "\centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - "*"

requirements:
  build:
    - libxrender-conda-ppc64le ==0.9.10 *_{{ cdt_build_number|int + 1000 }}
  host:
    - libxrender-conda-ppc64le ==0.9.10 *_{{ cdt_build_number|int + 1000 }}
    - sysroot_linux-ppc64le 2.17.*
  run:
    - libxrender-conda-ppc64le ==0.9.10 *_{{ cdt_build_number|int + 1000 }}
    - sysroot_linux-ppc64le 2.17.*

tests:
  script:
    - "echo "it installs!""

about:
  license: MIT
  license_file: {{ SRC_DIR }}/binary/LICENSE_NOT_FOUND
  summary: (CDT) X.Org X11 libXrender development package
  description: |
        X.Org X11 libXrender development package


  homepage: http://www.x.org

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
