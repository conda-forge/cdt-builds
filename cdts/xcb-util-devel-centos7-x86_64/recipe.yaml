schema_version: 1

package:
  name: xcb-util-devel-conda-x86_64
  version: 0.4.0

source:
  - url: https://vault.centos.org/7.9.2009/os/x86_64/Packages/xcb-util-devel-0.4.0-2.el7.x86_64.rpm
    sha256: 97bab516914a1e0e3cf33a748c3d917647e73bcc45a91975a2f9aff6e52db0c4
    target_directory: binary
    no_hoist: true
  # - url: https://vault.centos.org/7.9.2009/os/Source/SPackages/xcb-util-0.4.0-2.el7.src.rpm
  #   no_hoist: true
  #   folder: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: "distro != "\centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - "*"

requirements:
  build:
    - xcb-util-conda-x86_64 ==0.4.0 *_{{ cdt_build_number|int + 1000 }}
  host:
    - xcb-util-conda-x86_64 ==0.4.0 *_{{ cdt_build_number|int + 1000 }}
    - sysroot_linux-64 2.17.*
  run:
    - xcb-util-conda-x86_64 ==0.4.0 *_{{ cdt_build_number|int + 1000 }}
    - sysroot_linux-64 2.17.*

tests:
  script:
    - "echo "it installs!""

about:
  license: MIT
  license_file: {{ SRC_DIR }}/binary/LICENSE_NOT_FOUND
  summary: (CDT) Development and header files for xcb-util
  description: |
        Development files for xcb-util.


  homepage: http://xcb.freedesktop.org

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
