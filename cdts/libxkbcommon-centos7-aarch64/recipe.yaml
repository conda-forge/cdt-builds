schema_version: 1

package:
  name: libxkbcommon-conda-aarch64
  version: 0.7.1

source:
  - url: https://vault.centos.org/altarch/7.9.2009/os/aarch64/Packages/libxkbcommon-0.7.1-3.el7.aarch64.rpm
    sha256: ad9684ce41bae8980522aa3a48e5473f105c322a12df666b9a1d1a5ed0063b46
    target_directory: binary
    no_hoist: true
  # - url: https://vault.centos.org/altarch/7.9.2009/os/Source/SPackages/libxkbcommon-0.7.1-3.el7.src.rpm
  #   no_hoist: true
  #   folder: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: "distro != "\centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - "*"

requirements:
  host:
    - sysroot_linux-aarch64 2.17.*
  run:
    - sysroot_linux-aarch64 2.17.*

tests:
  script:
    - "echo "it installs!""

about:
  license: MIT
  license_file: {{ SRC_DIR }}/binary/usr/share/licenses/libxkbcommon-0.7.1/LICENSE
  summary: (CDT) X.Org X11 XKB parsing library
  description: |
        libxkbcommon is the X.Org library for compiling XKB maps into formats usable
        by the X Server or other display servers.


  homepage: http://www.x.org

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
