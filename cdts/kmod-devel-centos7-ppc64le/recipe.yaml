schema_version: 1

package:
  name: kmod-devel-conda-ppc64le
  version: 20

source:
  - url: https://vault.centos.org/altarch/7.9.2009/os/ppc64le/Packages/kmod-devel-20-28.el7.ppc64le.rpm
    sha256: 047d03fcd080fca188774f64b4bd13c3caba2f51e1895234c57f84a1dce77690
    target_directory: binary
    no_hoist: true
  # - url: https://vault.centos.org/altarch/7.9.2009/os/Source/SPackages/kmod-20-28.el7.src.rpm
  #   no_hoist: true
  #   folder: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: "distro != "\centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - "*"

requirements:
  build:
    - kmod-libs-conda-ppc64le ==20 *_{{ cdt_build_number|int + 1000 }}
  host:
    - kmod-libs-conda-ppc64le ==20 *_{{ cdt_build_number|int + 1000 }}
    - sysroot_linux-ppc64le 2.17.*
  run:
    - kmod-libs-conda-ppc64le ==20 *_{{ cdt_build_number|int + 1000 }}
    - sysroot_linux-ppc64le 2.17.*

tests:
  script:
    - "echo "it installs!""

about:
  license: GPL-2.0-or-later
  license_file: {{ SRC_DIR }}/binary/LICENSE_NOT_FOUND
  summary: (CDT) Header files for kmod development
  description: |
        The kmod-devel package provides header files used for development of
        applications that wish to load or unload Linux kernel modules.


  homepage: http://git.kernel.org/?p=utils/kernel/kmod/kmod.git;a=summary

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
