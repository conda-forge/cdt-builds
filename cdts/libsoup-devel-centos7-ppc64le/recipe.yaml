schema_version: 1

package:
  name: libsoup-devel-conda-ppc64le
  version: 2.62.2

source:
  - url: https://vault.centos.org/altarch/7.9.2009/os/ppc64le/Packages/libsoup-devel-2.62.2-2.el7.ppc64le.rpm
    sha256: d234917fd4525fc4974cac9cd10563d95f2945409172e962d744f75ec500084c
    target_directory: binary
    no_hoist: true
  # - url: https://vault.centos.org/altarch/7.9.2009/os/Source/SPackages/libsoup-2.62.2-2.el7.src.rpm
  #   no_hoist: true
  #   folder: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: "distro != "\centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - "*"

requirements:
  build:
    - libsoup-conda-ppc64le ==2.62.2 *_{{ cdt_build_number|int + 1000 }}
  host:
    - libsoup-conda-ppc64le ==2.62.2 *_{{ cdt_build_number|int + 1000 }}
    - sysroot_linux-ppc64le 2.17.*
  run:
    - libsoup-conda-ppc64le ==2.62.2 *_{{ cdt_build_number|int + 1000 }}
    - sysroot_linux-ppc64le 2.17.*

tests:
  script:
    - "echo "it installs!""

about:
  license: LGPLv2
  license_file: {{ SRC_DIR }}/binary/LICENSE_NOT_FOUND
  summary: (CDT) Header files for the Soup library
  description: |
        Libsoup is an HTTP library implementation in C. This package allows you to
        develop applications that use the libsoup library.


  homepage: https://wiki.gnome.org/Projects/libsoup

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
