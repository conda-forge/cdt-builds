schema_version: 1

package:
  name: libxext-conda-ppc64le
  version: 1.3.3

source:
  - url: https://vault.centos.org/altarch/7.9.2009/os/ppc64le/Packages/libXext-1.3.3-3.el7.ppc64le.rpm
    sha256: c4d853eda54756426a4e89fcc053f1cb47041498af154c2a9d3450713ac5413a
    target_directory: binary
    no_hoist: true
  # - url: https://vault.centos.org/altarch/7.9.2009/os/Source/SPackages/libXext-1.3.3-3.el7.src.rpm
  #   no_hoist: true
  #   folder: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: "distro != "\centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - "*"

requirements:
  build:
    - libx11-conda-ppc64le >=1.5.99.902 *_{{ cdt_build_number|int + 1000 }}
  host:
    - libx11-conda-ppc64le >=1.5.99.902 *_{{ cdt_build_number|int + 1000 }}
    - sysroot_linux-ppc64le 2.17.*
  run:
    - libx11-conda-ppc64le >=1.5.99.902 *_{{ cdt_build_number|int + 1000 }}
    - sysroot_linux-ppc64le 2.17.*

tests:
  script:
    - "echo "it installs!""

about:
  license: MIT
  license_file: {{ SRC_DIR }}/binary/usr/share/doc/libXext-1.3.3/COPYING
  summary: (CDT) X.Org X11 libXext runtime library
  description: |
        X.Org X11 libXext runtime library


  homepage: http://www.x.org

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
