schema_version: 1

# TODO: hack to workaround https://github.com/conda-forge/rattler-build-conda-compat/issues/112
context:
  cdt_build_number: 111
  distro: centos7

package:
  name: xorg-x11-util-macros-conda-x86_64
  version: 1.19.0

source:
  - url: https://vault.centos.org/7.9.2009/os/x86_64/Packages/xorg-x11-util-macros-1.19.0-3.el7.noarch.rpm
    sha256: 30b28d47366534ca958fce31e99de59d5a0ed52fc479049c5cd7bf9ad7d1373f
    target_directory: binary
  # - url: https://vault.centos.org/7.9.2009/os/Source/SPackages/xorg-x11-util-macros-1.19.0-3.el7.src.rpm
  #   target_directory: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: distro != "centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - "*"

requirements:
  build:
    - libarchive
  host:
    - sysroot_linux-64 2.17.*
  run:
    - sysroot_linux-64 2.17.*

tests:
  - script:
      - echo "it installs!"

about:
  homepage: http://www.x.org
  license: MIT
  license_file: binary/usr/share/doc/xorg-x11-util-macros-1.19.0/COPYING
  summary: (CDT) X.Org X11 Autotools macros
  description: |
        X.Org X11 autotools macros required for building the various packages that
        comprise the X Window System.

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
