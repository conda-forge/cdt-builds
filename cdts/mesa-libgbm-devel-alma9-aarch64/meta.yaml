package:
  name: mesa-libgbm-devel-conda-aarch64
  version: 25.0.7

source:
  - url: https://repo.almalinux.org/almalinux/9.7/AppStream/aarch64/os/Packages/mesa-libgbm-devel-25.0.7-5.el9_7.alma.1.aarch64.rpm
    sha256: 0333da450d244804e73962ea353c81ebfbd9a32d80f760d9be4e204e77c72fc1
    no_hoist: true
    folder: binary
  # - url: https://repo.almalinux.org/almalinux/9.7/AppStream/Source/Packages/mesa-25.0.7-5.el9_7.alma.1.src.rpm
  #   no_hoist: true
  #   folder: source

build:
  number: {{ cdt_build_number|int + 1000 }}
  noarch: generic
  binary_relocation: false
  detect_binary_files_with_prefix: false
  missing_dso_whitelist:
    - '*'
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  skip: true  # [distro != "alma9"]

requirements:
  build:
    - mesa-libgbm-conda-aarch64 ==25.0.7 *_{{ cdt_build_number|int + 1000 }}
  host:
    - mesa-libgbm-conda-aarch64 ==25.0.7 *_{{ cdt_build_number|int + 1000 }}
    - sysroot_linux-aarch64 2.34.*
  run:
    - mesa-libgbm-conda-aarch64 ==25.0.7 *_{{ cdt_build_number|int + 1000 }}
    - sysroot_linux-aarch64 2.34.*

test:
  commands:
    - echo "it installs!"

about:
  home: http://www.mesa3d.org
  license: MIT AND BSD-3-Clause AND SGI-B-2.0
  license_family: BSD
  license_file: mesa-license
  summary: (CDT) Mesa libgbm development package
  description: |
    Mesa libgbm development package.

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
