schema_version: 1

package:
  name: numactl-devel-conda-aarch64
  version: 2.0.12

source:
  - url: https://vault.centos.org/altarch/7.9.2009/os/aarch64/Packages/numactl-devel-2.0.12-5.el7.aarch64.rpm
    sha256: c9cf116e115f9a6560fbfb89ff741782b77c0cf4fa9488560608cc5e321609c8
    target_directory: binary
    no_hoist: true
  # - url: https://vault.centos.org/altarch/7.9.2009/os/Source/SPackages/numactl-2.0.12-5.el7.src.rpm
  #   no_hoist: true
  #   folder: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: "distro != "\centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - "*"

requirements:
  build:
    - numactl-libs-conda-aarch64 ==2.0.12 *_{{ cdt_build_number|int + 1000 }}
  host:
    - numactl-libs-conda-aarch64 ==2.0.12 *_{{ cdt_build_number|int + 1000 }}
    - sysroot_linux-aarch64 2.17.*
  run:
    - numactl-libs-conda-aarch64 ==2.0.12 *_{{ cdt_build_number|int + 1000 }}
    - sysroot_linux-aarch64 2.17.*

tests:
  script:
    - "echo "it installs!""

about:
  license: LGPLv2 and GPLv2
  license_file: {{ SRC_DIR }}/binary/LICENSE_NOT_FOUND
  summary: (CDT) Development package for building Applications that use numa
  description: |
        Provides development headers for numa library calls


  homepage: https://github.com/numactl/numactl

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
