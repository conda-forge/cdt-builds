schema_version: 1

package:
  name: pam-devel-conda-x86_64
  version: 1.3.1

source:
  - url: https://repo.almalinux.org/almalinux/8.10/BaseOS/x86_64/os/Packages/pam-devel-1.3.1-39.el8_10.x86_64.rpm
    sha256: c3a437f64d6dd2d5635d7b796d61001e2e6b95cca46cb609377b130c414dab00
    target_directory: binary
    no_hoist: true
  # - url: https://repo.almalinux.org/almalinux/8.10/BaseOS/Source/Packages/pam-1.3.1-39.el8_10.src.rpm
  #   no_hoist: true
  #   folder: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: "distro != "\alma8"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - "*"

requirements:
  build:
    - pam-conda-x86_64 ==1.3.1 *_{{ cdt_build_number|int + 1000 }}
  host:
    - pam-conda-x86_64 ==1.3.1 *_{{ cdt_build_number|int + 1000 }}
    - sysroot_linux-64 2.28.*
  run:
    - pam-conda-x86_64 ==1.3.1 *_{{ cdt_build_number|int + 1000 }}
    - sysroot_linux-64 2.28.*

tests:
  script:
    - "echo "it installs!""

about:
  license: BSD and GPLv2+
  license_file: {{ SRC_DIR }}/binary/usr/share/doc/pam-devel/html/mwg-copyright.html
  summary: (CDT) Files needed for developing PAM-aware applications and modules for PAM
  description: |
        PAM (Pluggable Authentication Modules) is a system security tool that allows
        system administrators to set authentication policy without having to recompile
        programs that handle authentication. This package contains header files used
        for building both PAM-aware applications and modules for use with the PAM
        system.


  homepage: http://www.linux-pam.org/

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
