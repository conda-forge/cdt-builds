schema_version: 1

package:
  name: libxshmfence-conda-x86_64
  version: 1.2

source:
  - url: https://vault.centos.org/7.9.2009/os/x86_64/Packages/libxshmfence-1.2-1.el7.x86_64.rpm
    sha256: 08d9e87212fedd61b7f59618b086e501222cd7f79768e493475d3fcd1f439ecb
    target_directory: binary
    no_hoist: true
  # - url: https://vault.centos.org/7.9.2009/os/Source/SPackages/libxshmfence-1.2-1.el7.src.rpm
  #   no_hoist: true
  #   folder: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: "distro != "\centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - "*"

requirements:
  host:
    - sysroot_linux-64 2.17.*
  run:
    - sysroot_linux-64 2.17.*

tests:
  script:
    - "echo "it installs!""

about:
  license: MIT
  license_file: {{ SRC_DIR }}/binary/LICENSE_NOT_FOUND
  summary: (CDT) X11 shared memory fences
  description: |
        Shared memory fences for X11, as used in DRI3.


  homepage: http://www.x.org/

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
