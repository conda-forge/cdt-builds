schema_version: 1

package:
  name: orbit2-devel-conda-aarch64
  version: 2.14.19

source:
  - url: https://vault.centos.org/altarch/7.9.2009/os/aarch64/Packages/ORBit2-devel-2.14.19-13.el7.aarch64.rpm
    sha256: 76282f803fdeb92c22cc78add7a79247fb3243f7399bd1a596b373af28cb3889
    target_directory: binary
    no_hoist: true
  # - url: https://vault.centos.org/altarch/7.9.2009/os/Source/SPackages/ORBit2-2.14.19-13.el7.src.rpm
  #   no_hoist: true
  #   folder: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: "distro != "\centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - "*"

requirements:
  build:
    - orbit2-conda-aarch64 ==2.14.19 *_{{ cdt_build_number|int + 1000 }}
    - glib2-devel-conda-aarch64 >=2.2.0 *_{{ cdt_build_number|int + 1000 }}
    - libidl-devel-conda-aarch64 >=0.8.2 *_{{ cdt_build_number|int + 1000 }}
  host:
    - orbit2-conda-aarch64 ==2.14.19 *_{{ cdt_build_number|int + 1000 }}
    - glib2-devel-conda-aarch64 >=2.2.0 *_{{ cdt_build_number|int + 1000 }}
    - libidl-devel-conda-aarch64 >=0.8.2 *_{{ cdt_build_number|int + 1000 }}
    - sysroot_linux-aarch64 2.17.*
  run:
    - orbit2-conda-aarch64 ==2.14.19 *_{{ cdt_build_number|int + 1000 }}
    - glib2-devel-conda-aarch64 >=2.2.0 *_{{ cdt_build_number|int + 1000 }}
    - libidl-devel-conda-aarch64 >=0.8.2 *_{{ cdt_build_number|int + 1000 }}
    - sysroot_linux-aarch64 2.17.*

tests:
  script:
    - "echo "it installs!""

about:
  license: LGPLv2+ and GPLv2+
  license_file: {{ SRC_DIR }}/binary/LICENSE_NOT_FOUND
  summary: (CDT) Development libraries, header files and utilities for ORBit
  description: |
        ORBit is a high-performance CORBA (Common Object Request Broker Architecture)
        ORB (object request broker) with support for the C language.  This package
        contains the header files, libraries and utilities necessary to write programs
        that use CORBA technology. If you want to write such programs, you'll also
        need to install the ORBIT package.


  homepage: http://www.gnome.org/projects/ORBit2

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
