schema_version: 1

# TODO: hack to workaround https://github.com/conda-forge/rattler-build-conda-compat/issues/112
context:
  cdt_build_number: 111
  distro: centos7

package:
  name: xcb-util-keysyms-devel-conda-ppc64le
  version: 0.4.0

source:
  - url: https://vault.centos.org/altarch/7.9.2009/os/ppc64le/Packages/xcb-util-keysyms-devel-0.4.0-1.el7.ppc64le.rpm
    sha256: 041b81836e122dc5607b7ee383dee8fe412c5960753cfe2c58cef5c85be65015
    target_directory: binary
  # - url: https://vault.centos.org/altarch/7.9.2009/os/Source/SPackages/xcb-util-keysyms-0.4.0-1.el7.src.rpm
  #   target_directory: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: distro != "centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - '*'

requirements:
  build:
    - xcb-util-keysyms-conda-ppc64le ==0.4.0 *_${{ cdt_build_number|int + 1000 }}
    - libarchive
  host:
    - xcb-util-keysyms-conda-ppc64le ==0.4.0 *_${{ cdt_build_number|int + 1000 }}
    - sysroot_linux-ppc64le 2.17.*
  run:
    - xcb-util-keysyms-conda-ppc64le ==0.4.0 *_${{ cdt_build_number|int + 1000 }}
    - sysroot_linux-ppc64le 2.17.*

tests:
  - script:
      - echo "it installs!"

about:
  homepage: http://xcb.freedesktop.org
  license: MIT
  license_file: xcb-util-keysyms-license
  summary: (CDT) Development and header files for xcb-util-keysyms
  description: |
    Development files for xcb-util-keysyms.

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
