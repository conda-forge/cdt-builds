schema_version: 1

package:
  name: glib-networking-conda-x86_64
  version: 2.56.1

source:
  - url: https://vault.centos.org/7.9.2009/os/x86_64/Packages/glib-networking-2.56.1-1.el7.x86_64.rpm
    sha256: 725c4ebc91ab6f818a71e8a91f50777e627d6426155ee8e6a8b9ead6b23f0161
    target_directory: binary
    no_hoist: true
  # - url: https://vault.centos.org/7.9.2009/os/Source/SPackages/glib-networking-2.56.1-1.el7.src.rpm
  #   no_hoist: true
  #   folder: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: "distro != "\centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - "*"

requirements:
  build:
    - glib2-conda-x86_64 >=2.55.1 *_{{ cdt_build_number|int + 1000 }}
  host:
    - glib2-conda-x86_64 >=2.55.1 *_{{ cdt_build_number|int + 1000 }}
    - sysroot_linux-64 2.17.*
  run:
    - glib2-conda-x86_64 >=2.55.1 *_{{ cdt_build_number|int + 1000 }}
    - sysroot_linux-64 2.17.*

tests:
  script:
    - "echo "it installs!""

about:
  license: LGPL-2.0-or-later
  license_file: {{ SRC_DIR }}/binary/usr/share/licenses/glib-networking-2.56.1/COPYING
  summary: (CDT) Networking support for GLib
  description: |
        This package contains modules that extend the networking support in GIO. In
        particular, it contains libproxy- and GSettings-based GProxyResolver
        implementations and a gnutls-based GTlsConnection implementation.


  homepage: http://www.gnome.org

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
