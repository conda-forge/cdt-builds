schema_version: 1

package:
  name: expat-devel-conda-aarch64
  version: 2.1.0

source:
  - url: https://vault.centos.org/altarch/7.9.2009/os/aarch64/Packages/expat-devel-2.1.0-12.el7.aarch64.rpm
    sha256: eb818da9347fa683079771a80a725cdd73f29373000868f602d2d8c591040eb7
    target_directory: binary
    no_hoist: true
  # - url: https://vault.centos.org/altarch/7.9.2009/os/Source/SPackages/expat-2.1.0-12.el7.src.rpm
  #   no_hoist: true
  #   folder: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: "distro != "\centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - "*"

requirements:
  build:
    - expat-conda-aarch64 ==2.1.0 *_{{ cdt_build_number|int + 1000 }}
  host:
    - expat-conda-aarch64 ==2.1.0 *_{{ cdt_build_number|int + 1000 }}
    - sysroot_linux-aarch64 2.17.*
  run:
    - expat-conda-aarch64 ==2.1.0 *_{{ cdt_build_number|int + 1000 }}
    - sysroot_linux-aarch64 2.17.*

tests:
  script:
    - "echo "it installs!""

about:
  license: MIT
  license_file: {{ SRC_DIR }}/binary/LICENSE_NOT_FOUND
  summary: (CDT) Libraries and header files to develop applications using expat
  description: |
        The expat-devel package contains the libraries, include files and
        documentation to develop XML applications with expat.


  homepage: http://www.libexpat.org/

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
