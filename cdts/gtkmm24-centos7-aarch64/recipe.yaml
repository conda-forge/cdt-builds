schema_version: 1

# TODO: hack to workaround https://github.com/conda-forge/rattler-build-conda-compat/issues/112
context:
  cdt_build_number: 111
  distro: centos7

package:
  name: gtkmm24-conda-aarch64
  version: 2.24.5

source:
  - url: https://vault.centos.org/altarch/7.9.2009/os/aarch64/Packages/gtkmm24-2.24.5-1.el7.aarch64.rpm
    sha256: 6989e8585383743d0a63884ffb48d879fb31c76eb339ab015781ffe178492203
    target_directory: binary
  # - url: https://vault.centos.org/altarch/7.9.2009/os/Source/SPackages/gtkmm24-2.24.5-1.el7.src.rpm
  #   target_directory: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: distro != "centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - '*'

requirements:
  build:
    - libarchive
  host:
    - sysroot_linux-aarch64 2.17.*
  run:
    - sysroot_linux-aarch64 2.17.*

tests:
  - script:
      - echo "it installs!"

about:
  homepage: http://www.gtkmm.org/
  license: LGPL-2.0-or-later
  license_file:
    - gtkmm-license
    - gtkmm-tools-license
  summary: (CDT) C++ interface for GTK2 (a GUI library for X)
  description: |
    gtkmm provides a C++ interface to the GTK+ GUI library. gtkmm2 wraps GTK+ 2.
    Highlights include typesafe callbacks, widgets extensible via inheritance and
    a comprehensive set of widget classes that can be freely combined to quickly
    create complex user interfaces.

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
