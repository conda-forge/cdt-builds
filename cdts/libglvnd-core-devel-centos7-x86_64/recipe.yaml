schema_version: 1

# TODO: hack to workaround https://github.com/conda-forge/rattler-build-conda-compat/issues/112
context:
  cdt_build_number: 111
  distro: centos7

package:
  name: libglvnd-core-devel-conda-x86_64
  version: 1.0.1

source:
  - url: https://vault.centos.org/7.9.2009/os/x86_64/Packages/libglvnd-core-devel-1.0.1-0.8.git5baa1e5.el7.x86_64.rpm
    sha256: d2fbbe03d60015cbaa05f437825816dc9af19e78664fbcb58c689dd252a7841c
    target_directory: binary
  # - url: https://vault.centos.org/7.9.2009/os/Source/SPackages/libglvnd-1.0.1-0.8.git5baa1e5.el7.src.rpm
  #   target_directory: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: distro != "centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - '*'

requirements:
  build:
    - libarchive
  host:
    - sysroot_linux-64 2.17.*
  run:
    - sysroot_linux-64 2.17.*

tests:
  - script:
      - echo "it installs!"

about:
  homepage: https://github.com/NVIDIA/libglvnd
  license: MIT
  license_file: libglvnd-license
  summary: (CDT) Core development files for libglvnd
  description: |
    The libglvnd-core-devel package is a bootstrap trick for Mesa, which wants to
    build against the libglvnd headers but does not link against any of its
    libraries (and, initially, has file conflicts with them). If you are not Mesa
    you almost certainly want libglvnd-devel instead.

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
