schema_version: 1

# TODO: hack to workaround https://github.com/conda-forge/rattler-build-conda-compat/issues/112
context:
  cdt_build_number: 111
  distro: centos7

package:
  name: opensm-devel-conda-ppc64le
  version: 3.3.21

source:
  - url: https://vault.centos.org/altarch/7.9.2009/os/ppc64le/Packages/opensm-devel-3.3.21-3.el7_8.ppc64le.rpm
    sha256: 2c2c2c7b67185d1d25c0517b0b26d77a025717e1b8084e37f455a4f425c66440
    target_directory: binary
  # - url: https://vault.centos.org/altarch/7.9.2009/os/Source/SPackages/opensm-3.3.21-3.el7_8.src.rpm
  #   target_directory: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: distro != "centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - '*'

requirements:
  build:
    - opensm-libs-conda-ppc64le ==3.3.21 *_${{ cdt_build_number|int + 1000 }}
    - libarchive
  host:
    - opensm-libs-conda-ppc64le ==3.3.21 *_${{ cdt_build_number|int + 1000 }}
    - sysroot_linux-ppc64le 2.17.*
  run:
    - opensm-libs-conda-ppc64le ==3.3.21 *_${{ cdt_build_number|int + 1000 }}
    - sysroot_linux-ppc64le 2.17.*

tests:
  - script:
      - echo "it installs!"

about:
  homepage: https://github.com/linux-rdma/opensm
  license: GPL-2.0-only OR LicenseRef-Callaway-BSD
  license_file:
    - opensm-license
  summary: (CDT) Development files for the opensm-libs libraries
  description: |
    Development environment for the opensm libraries

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
