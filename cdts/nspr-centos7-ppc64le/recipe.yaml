schema_version: 1

# TODO: hack to workaround https://github.com/conda-forge/rattler-build-conda-compat/issues/112
context:
  cdt_build_number: 111
  distro: centos7

package:
  name: nspr-conda-ppc64le
  version: 4.21.0

source:
  - url: https://vault.centos.org/altarch/7.9.2009/os/ppc64le/Packages/nspr-4.21.0-1.el7.ppc64le.rpm
    sha256: 45364781cd4ba368dcfece9587c8d9e89324aaceadbb134530b83596cd0d3e8b
    target_directory: binary
  # - url: https://vault.centos.org/altarch/7.9.2009/os/Source/SPackages/nspr-4.21.0-1.el7.src.rpm
  #   target_directory: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: distro != "centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - '*'

requirements:
  build:
    - libarchive
  host:
    - sysroot_linux-ppc64le 2.17.*
  run:
    - sysroot_linux-ppc64le 2.17.*

tests:
  - script:
      - echo "it installs!"

about:
  homepage: http://www.mozilla.org/projects/nspr/
  license: MPL-2.0
  license_file: nspr-license
  summary: (CDT) Netscape Portable Runtime
  description: |
    NSPR provides platform independence for non-GUI operating system facilities.
    These facilities include threads, thread synchronization, normal file and
    network I/O, interval timing and calendar time, basic memory management
    (malloc and free) and shared library linking.

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
