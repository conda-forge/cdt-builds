schema_version: 1

package:
  name: libxfixes-devel-conda-aarch64
  version: 5.0.3

source:
  - url: https://vault.centos.org/altarch/7.9.2009/os/aarch64/Packages/libXfixes-devel-5.0.3-1.el7.aarch64.rpm
    sha256: b8eb45abf6e6f4cb9b149821aedb6fedbe0b307d609c46773063701baa62420a
    target_directory: binary
    no_hoist: true
  # - url: https://vault.centos.org/altarch/7.9.2009/os/Source/SPackages/libXfixes-5.0.3-1.el7.src.rpm
  #   no_hoist: true
  #   folder: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: "distro != "\centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - "*"

requirements:
  build:
    - libxfixes-conda-aarch64 ==5.0.3 *_{{ cdt_build_number|int + 1000 }}
  host:
    - libxfixes-conda-aarch64 ==5.0.3 *_{{ cdt_build_number|int + 1000 }}
    - sysroot_linux-aarch64 2.17.*
  run:
    - libxfixes-conda-aarch64 ==5.0.3 *_{{ cdt_build_number|int + 1000 }}
    - sysroot_linux-aarch64 2.17.*

tests:
  script:
    - "echo "it installs!""

about:
  license: MIT
  license_file: {{ SRC_DIR }}/binary/LICENSE_NOT_FOUND
  summary: (CDT) Development files for libXfixes
  description: |
        libXfixes development package


  homepage: http://www.x.org

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
