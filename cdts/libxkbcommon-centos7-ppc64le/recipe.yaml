schema_version: 1

# TODO: hack to workaround https://github.com/conda-forge/rattler-build-conda-compat/issues/112
context:
  cdt_build_number: 111
  distro: centos7

package:
  name: libxkbcommon-conda-ppc64le
  version: 0.7.1

source:
  - url: https://vault.centos.org/altarch/7.9.2009/os/ppc64le/Packages/libxkbcommon-0.7.1-3.el7.ppc64le.rpm
    sha256: 8a12c418e21ae58e623a2ef98cbd93d52748025c65519e1811c5144fe7d3d8bb
    target_directory: binary
  # - url: https://vault.centos.org/altarch/7.9.2009/os/Source/SPackages/libxkbcommon-0.7.1-3.el7.src.rpm
  #   target_directory: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: distro != "centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - '*'

requirements:
  build:
    - libarchive
  host:
    - sysroot_linux-ppc64le 2.17.*
  run:
    - sysroot_linux-ppc64le 2.17.*

tests:
  - script:
      - echo "it installs!"

about:
  homepage: http://www.x.org
  license: MIT
  license_file: libxkbcommon-license
  summary: (CDT) X.Org X11 XKB parsing library
  description: |
    libxkbcommon is the X.Org library for compiling XKB maps into formats usable
    by the X Server or other display servers.

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
