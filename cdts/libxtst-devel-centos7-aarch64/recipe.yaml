schema_version: 1

package:
  name: libxtst-devel-conda-aarch64
  version: 1.2.3

source:
  - url: https://vault.centos.org/altarch/7.9.2009/os/aarch64/Packages/libXtst-devel-1.2.3-1.el7.aarch64.rpm
    sha256: a4440f10a4936d7da02fb512896f62df1162a7fb50e289322d43bc0ce631a56c
    target_directory: binary
    no_hoist: true
  # - url: https://vault.centos.org/altarch/7.9.2009/os/Source/SPackages/libXtst-1.2.3-1.el7.src.rpm
  #   no_hoist: true
  #   folder: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: "distro != "\centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - "*"

requirements:
  build:
    - libxtst-conda-aarch64 ==1.2.3 *_{{ cdt_build_number|int + 1000 }}
  host:
    - libxtst-conda-aarch64 ==1.2.3 *_{{ cdt_build_number|int + 1000 }}
    - sysroot_linux-aarch64 2.17.*
  run:
    - libxtst-conda-aarch64 ==1.2.3 *_{{ cdt_build_number|int + 1000 }}
    - sysroot_linux-aarch64 2.17.*

tests:
  script:
    - "echo "it installs!""

about:
  license: MIT
  license_file: {{ SRC_DIR }}/binary/LICENSE_NOT_FOUND
  summary: (CDT) X.Org X11 libXtst development package
  description: |
        X.Org X11 libXtst development package


  homepage: http://www.x.org

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
