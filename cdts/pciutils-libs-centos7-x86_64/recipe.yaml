schema_version: 1

# TODO: hack to workaround https://github.com/conda-forge/rattler-build-conda-compat/issues/112
context:
  cdt_build_number: 111
  distro: centos7

package:
  name: pciutils-libs-conda-x86_64
  version: 3.5.1

source:
  - url: https://vault.centos.org/7.9.2009/os/x86_64/Packages/pciutils-libs-3.5.1-3.el7.x86_64.rpm
    sha256: 35f1395c93ca55224b0574fcfd3e2a77a62e545356e17151398d371e04e2034c
    target_directory: binary
  # - url: https://vault.centos.org/7.9.2009/os/Source/SPackages/pciutils-3.5.1-3.el7.src.rpm
  #   target_directory: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: distro != "centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - '*'

requirements:
  build:
    - libarchive
  host:
    - sysroot_linux-64 2.17.*
  run:
    - sysroot_linux-64 2.17.*

tests:
  - script:
      - echo "it installs!"

about:
  homepage: http://atrey.karlin.mff.cuni.cz/~mj/pciutils.shtml
  license: GPL-2.0-or-later
  license_file: pciutils-license
  summary: (CDT) Linux PCI library
  description: |
    This package contains a library for inspecting and setting devices connected
    to the PCI bus.

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
