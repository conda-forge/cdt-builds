schema_version: 1

package:
  name: java-1.7.0-openjdk-conda-aarch64
  version: 1.7.0.261

source:
  - url: https://vault.centos.org/altarch/7.9.2009/os/aarch64/Packages/java-1.7.0-openjdk-1.7.0.261-2.6.22.2.el7_8.aarch64.rpm
    sha256: e985dfe2a945dfd57a11b1300850d6563206aecdebe085d07e1efae9f8f48bd0
    target_directory: binary
    no_hoist: true
  # - url: https://vault.centos.org/altarch/7.9.2009/os/Source/SPackages/java-1.7.0-openjdk-1.7.0.261-2.6.22.2.el7_8.src.rpm
  #   no_hoist: true
  #   folder: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: "distro != "\centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - "*"

requirements:
  build:
    - java-1.7.0-openjdk-headless-conda-aarch64 ==1.7.0.261 *_{{ cdt_build_number|int + 1000 }}
  host:
    - java-1.7.0-openjdk-headless-conda-aarch64 ==1.7.0.261 *_{{ cdt_build_number|int + 1000 }}
    - sysroot_linux-aarch64 2.17.*
  run:
    - java-1.7.0-openjdk-headless-conda-aarch64 ==1.7.0.261 *_{{ cdt_build_number|int + 1000 }}
    - sysroot_linux-aarch64 2.17.*

tests:
  script:
    - "echo "it installs!""

about:
  license: ASL 1.1 and ASL 2.0 and BSD and BSD with advertising and GPL+ and GPLv2 and GPLv2 with exceptions and IJG and LGPLv2+ and MIT and MPLv1.1 and MPLv2.0 and Public Domain and W3C and zlib
  license_file: {{ SRC_DIR }}/binary/LICENSE_NOT_FOUND
  summary: (CDT) OpenJDK Runtime Environment
  description: |
        The OpenJDK runtime environment.


  homepage: http://openjdk.java.net/

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
