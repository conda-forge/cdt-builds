schema_version: 1

package:
  name: libxscrnsaver-devel-conda-ppc64le
  version: 1.2.2

source:
  - url: https://vault.centos.org/altarch/7.9.2009/os/ppc64le/Packages/libXScrnSaver-devel-1.2.2-6.1.el7.ppc64le.rpm
    sha256: 6b414d2e18ad827130852f287aa5968c32b3937c68cbeba9e33f1c09cb7ca5e8
    target_directory: binary
    no_hoist: true
  # - url: https://vault.centos.org/altarch/7.9.2009/os/Source/SPackages/libXScrnSaver-1.2.2-6.1.el7.src.rpm
  #   no_hoist: true
  #   folder: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: "distro != "\centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - "*"

requirements:
  build:
    - libxscrnsaver-conda-ppc64le ==1.2.2 *_{{ cdt_build_number|int + 1000 }}
  host:
    - libxscrnsaver-conda-ppc64le ==1.2.2 *_{{ cdt_build_number|int + 1000 }}
    - sysroot_linux-ppc64le 2.17.*
  run:
    - libxscrnsaver-conda-ppc64le ==1.2.2 *_{{ cdt_build_number|int + 1000 }}
    - sysroot_linux-ppc64le 2.17.*

tests:
  script:
    - "echo "it installs!""

about:
  license: MIT
  license_file: {{ SRC_DIR }}/binary/LICENSE_NOT_FOUND
  summary: (CDT) X.Org X11 libXScrnSaver development package
  description: |
        X.Org X11 libXss development package


  homepage: http://www.x.org

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
