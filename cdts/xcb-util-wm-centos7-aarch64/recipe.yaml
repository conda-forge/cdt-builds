schema_version: 1

package:
  name: xcb-util-wm-conda-aarch64
  version: 0.4.1

source:
  - url: https://vault.centos.org/altarch/7.9.2009/os/aarch64/Packages/xcb-util-wm-0.4.1-5.el7.aarch64.rpm
    sha256: d70e65d6f172f5d5820f3445ae3bbec3274e5cd31bf796f89e0b9300fc7067d6
    target_directory: binary
    no_hoist: true
  # - url: https://vault.centos.org/altarch/7.9.2009/os/Source/SPackages/xcb-util-wm-0.4.1-5.el7.src.rpm
  #   no_hoist: true
  #   folder: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: "distro != "\centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - "*"

requirements:
  host:
    - sysroot_linux-aarch64 2.17.*
  run:
    - sysroot_linux-aarch64 2.17.*

tests:
  script:
    - "echo "it installs!""

about:
  license: MIT
  license_file: {{ SRC_DIR }}/binary/usr/share/doc/xcb-util-wm-0.4.1/COPYING
  summary: (CDT) Client and window-manager helper library on top of libxcb
  description: |
        XCB util-wm module provides the following libraries:    - ewmh: Both client
        and window-manager helpers for EWMH.   - icccm: Both client and window-manager
        helpers for ICCCM.


  homepage: http://xcb.freedesktop.org

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
