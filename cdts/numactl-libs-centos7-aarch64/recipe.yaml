schema_version: 1

# TODO: hack to workaround https://github.com/conda-forge/rattler-build-conda-compat/issues/112
context:
  cdt_build_number: 111
  distro: centos7

package:
  name: numactl-libs-conda-aarch64
  version: 2.0.12

source:
  - url: https://vault.centos.org/altarch/7.9.2009/os/aarch64/Packages/numactl-libs-2.0.12-5.el7.aarch64.rpm
    sha256: c4ba0c78449b077223c0a8a22ab28ac7d9f29328dea459f92ff7b33b1abd62db
    target_directory: binary
  # - url: https://vault.centos.org/altarch/7.9.2009/os/Source/SPackages/numactl-2.0.12-5.el7.src.rpm
  #   target_directory: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: distro != "centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - '*'

requirements:
  build:
    - libarchive
  host:
    - sysroot_linux-aarch64 2.17.*
  run:
    - sysroot_linux-aarch64 2.17.*

tests:
  - script:
      - echo "it installs!"

about:
  homepage: https://github.com/numactl/numactl
  license: LGPL-2.0-only AND GPL-2.0-only
  license_file:
    - numactl-copyright.txt
    - numactl-gpl2.txt
    - numactl-lgpl2.txt
  summary: (CDT) libnuma libraries
  description: |
    numactl-libs provides libnuma, a library to do allocations with NUMA policy in
    applications.

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
