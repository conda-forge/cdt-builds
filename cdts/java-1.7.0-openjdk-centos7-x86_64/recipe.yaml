schema_version: 1

# TODO: hack to workaround https://github.com/conda-forge/rattler-build-conda-compat/issues/112
context:
  cdt_build_number: 111
  distro: centos7

package:
  name: java-1.7.0-openjdk-conda-x86_64
  version: 1.7.0.261

source:
  - url: https://vault.centos.org/7.9.2009/os/x86_64/Packages/java-1.7.0-openjdk-1.7.0.261-2.6.22.2.el7_8.x86_64.rpm
    sha256: fabe67fc9df555934da2d72279096fd3c24b3e2ff47850f5896505890f38a0a4
    target_directory: binary
  # - url: https://vault.centos.org/7.9.2009/os/Source/SPackages/java-1.7.0-openjdk-1.7.0.261-2.6.22.2.el7_8.src.rpm
  #   target_directory: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: distro != "centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - '*'

requirements:
  build:
    - java-1.7.0-openjdk-headless-conda-x86_64 ==1.7.0.261 *_${{ cdt_build_number|int + 1000 }}
    - libarchive
  host:
    - java-1.7.0-openjdk-headless-conda-x86_64 ==1.7.0.261 *_${{ cdt_build_number|int + 1000 }}
    - sysroot_linux-64 2.17.*
  run:
    - java-1.7.0-openjdk-headless-conda-x86_64 ==1.7.0.261 *_${{ cdt_build_number|int + 1000 }}
    - sysroot_linux-64 2.17.*

tests:
  - script:
      - echo "it installs!"

about:
  homepage: http://openjdk.java.net/
  license: Apache-1.1 AND Apache-2.0 AND LicenseRef-Callaway-BSD AND LicenseRef-Callaway-BSD AND GPL-2.0-only AND GPL-2.0-only AND GPL-2.0-only WITH Classpath-exception-2.0 AND IJG AND LGPL-2.0-or-later AND MIT AND MPL-1.1 AND MPL-2.0 AND LicenseRef-Callaway-Public-Domain AND W3C AND Zlib
  license_file: openjdk-license
  summary: (CDT) OpenJDK Runtime Environment
  description: |
    The OpenJDK runtime environment.

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
