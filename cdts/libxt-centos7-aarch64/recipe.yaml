schema_version: 1

# TODO: hack to workaround https://github.com/conda-forge/rattler-build-conda-compat/issues/112
context:
  cdt_build_number: 111
  distro: centos7

package:
  name: libxt-conda-aarch64
  version: 1.1.5

source:
  - url: https://vault.centos.org/altarch/7.9.2009/os/aarch64/Packages/libXt-1.1.5-3.el7.aarch64.rpm
    sha256: 14feaf71d24a02a9ca3dc6b8cc6934f557725010d88c8bd66167d733396ea610
    target_directory: binary
  # - url: https://vault.centos.org/altarch/7.9.2009/os/Source/SPackages/libXt-1.1.5-3.el7.src.rpm
  #   target_directory: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: distro != "centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - "*"

requirements:
  build:
    - libx11-conda-aarch64 >=1.5.99.902 *_${{ cdt_build_number|int + 1000 }}
    - libarchive
  host:
    - libx11-conda-aarch64 >=1.5.99.902 *_${{ cdt_build_number|int + 1000 }}
    - sysroot_linux-aarch64 2.17.*
  run:
    - libx11-conda-aarch64 >=1.5.99.902 *_${{ cdt_build_number|int + 1000 }}
    - sysroot_linux-aarch64 2.17.*

tests:
  - script:
      - echo "it installs!"

about:
  homepage: http://www.x.org
  license: MIT
  license_file: binary/usr/share/doc/libXt/COPYING
  summary: (CDT) X.Org X11 libXt runtime library
  description: |
        X.Org X11 libXt runtime library

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
