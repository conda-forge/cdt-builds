schema_version: 1

# TODO: hack to workaround https://github.com/conda-forge/rattler-build-conda-compat/issues/112
context:
  cdt_build_number: 111
  distro: alma9

package:
  name: pam-devel-conda-ppc64le
  version: 1.5.1

source:
  - url: https://repo.almalinux.org/almalinux/9.7/AppStream/ppc64le/os/Packages/pam-devel-1.5.1-26.el9_6.ppc64le.rpm
    sha256: 1ff025ea91ff8c41070f17eb32749bb471dd6f0586abde76c7018f314c5ad8a1
    target_directory: binary
  # - url: https://repo.almalinux.org/almalinux/9.7/AppStream/Source/Packages/pam-1.5.1-26.el9_6.src.rpm
  #   target_directory: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: distro != "alma9"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - "*"

requirements:
  build:
    - pam-conda-ppc64le ==1.5.1 *_${{ cdt_build_number|int + 1000 }}
    - libarchive
  host:
    - pam-conda-ppc64le ==1.5.1 *_${{ cdt_build_number|int + 1000 }}
    - sysroot_linux-ppc64le 2.34.*
  run:
    - pam-conda-ppc64le ==1.5.1 *_${{ cdt_build_number|int + 1000 }}
    - sysroot_linux-ppc64le 2.34.*

tests:
  - script:
      - echo "it installs!"

about:
  homepage: http://www.linux-pam.org/
  license: LicenseRef-Callaway-BSD AND GPL-2.0-or-later
  license_file: binary/usr/share/doc/pam-devel/html/mwg-copyright.html
  summary: (CDT) Files needed for developing PAM-aware applications and modules for PAM
  description: |
        PAM (Pluggable Authentication Modules) is a system security tool that allows
        system administrators to set authentication policy without having to recompile
        programs that handle authentication. This package contains header files used
        for building both PAM-aware applications and modules for use with the PAM
        system.

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
