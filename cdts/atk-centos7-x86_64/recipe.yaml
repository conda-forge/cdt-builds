schema_version: 1

# TODO: hack to workaround https://github.com/conda-forge/rattler-build-conda-compat/issues/112
context:
  cdt_build_number: 111
  distro: centos7

package:
  name: atk-conda-x86_64
  version: 2.28.1

source:
  - url: https://vault.centos.org/7.9.2009/os/x86_64/Packages/atk-2.28.1-2.el7.x86_64.rpm
    sha256: 942fc4bc5390444c1758043bc5dd4c01c84e3e7c008c1c8ad4a6aefffb5e458d
    target_directory: binary
  # - url: https://vault.centos.org/7.9.2009/os/Source/SPackages/atk-2.28.1-2.el7.src.rpm
  #   target_directory: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: distro != "centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - '*'

requirements:
  build:
    - libarchive
  host:
    - sysroot_linux-64 2.17.*
  run:
    - sysroot_linux-64 2.17.*

tests:
  - script:
      - echo "it installs!"

about:
  homepage: http://developer.gnome.org/platform-overview/stable/atk
  license: LGPL-2.0-or-later
  license_file: atk-copying
  summary: (CDT) Interfaces for accessibility support
  description: |
    The ATK library provides a set of interfaces for adding accessibility support
    to applications and graphical user interface toolkits. By supporting the ATK
    interfaces, an application or toolkit can be used with tools such as screen
    readers, magnifiers, and alternative input devices.

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
