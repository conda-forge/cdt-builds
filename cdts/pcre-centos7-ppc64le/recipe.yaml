schema_version: 1

# TODO: hack to workaround https://github.com/conda-forge/rattler-build-conda-compat/issues/112
context:
  cdt_build_number: 111
  distro: centos7

package:
  name: pcre-conda-ppc64le
  version: 8.32

source:
  - url: https://vault.centos.org/altarch/7.9.2009/os/ppc64le/Packages/pcre-8.32-17.el7.ppc64le.rpm
    sha256: 0955ba280e76a9f59fa7d47764c8c2645fd7caa89c48b7d292e706ef7a35b545
    target_directory: binary
  # - url: https://vault.centos.org/altarch/7.9.2009/os/Source/SPackages/pcre-8.32-17.el7.src.rpm
  #   target_directory: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: distro != "centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - "*"

requirements:
  build:
    - libarchive
  host:
    - sysroot_linux-ppc64le 2.17.*
  run:
    - sysroot_linux-ppc64le 2.17.*

tests:
  - script:
      - echo "it installs!"

about:
  homepage: http://www.pcre.org/
  license: LicenseRef-Callaway-BSD
  license_file: binary/usr/share/doc/pcre-8.32/LICENCE
  summary: (CDT) Perl-compatible regular expression library
  description: |
        Perl-compatible regular expression library. PCRE has its own native API, but a
        set of "wrapper" functions that are based on the POSIX API are also supplied
        in the library libpcreposix. Note that this just provides a POSIX calling
        interface to PCRE: the regular expressions themselves still follow Perl syntax
        and semantics. The header file for the POSIX-style functions is called
        pcreposix.h.

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
