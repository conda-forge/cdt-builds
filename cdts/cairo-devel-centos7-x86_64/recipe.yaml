schema_version: 1

package:
  name: cairo-devel-conda-x86_64
  version: 1.15.12

source:
  - url: https://vault.centos.org/7.9.2009/os/x86_64/Packages/cairo-devel-1.15.12-4.el7.x86_64.rpm
    sha256: 05f95f4864c7e85fd801638c1183a292dd0054a07e38cee077288431a7c82d62
    target_directory: binary
    no_hoist: true
  # - url: https://vault.centos.org/7.9.2009/os/Source/SPackages/cairo-1.15.12-4.el7.src.rpm
  #   no_hoist: true
  #   folder: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: "distro != "\centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - "*"

requirements:
  build:
    - cairo-conda-x86_64 ==1.15.12 *_{{ cdt_build_number|int + 1000 }}
  host:
    - cairo-conda-x86_64 ==1.15.12 *_{{ cdt_build_number|int + 1000 }}
    - sysroot_linux-64 2.17.*
  run:
    - cairo-conda-x86_64 ==1.15.12 *_{{ cdt_build_number|int + 1000 }}
    - sysroot_linux-64 2.17.*

tests:
  script:
    - "echo "it installs!""

about:
  license: LGPLv2 or MPLv1.1
  license_file: {{ SRC_DIR }}/binary/LICENSE_NOT_FOUND
  summary: (CDT) Development files for cairo
  description: |
        Cairo is a 2D graphics library designed to provide high-quality display and
        print output.  This package contains libraries, header files and developer
        documentation needed for developing software which uses the cairo graphics
        library.


  homepage: http://cairographics.org

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
