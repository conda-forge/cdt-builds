schema_version: 1

package:
  name: expat-conda-x86_64
  version: 2.1.0

source:
  - url: https://vault.centos.org/7.9.2009/os/x86_64/Packages/expat-2.1.0-12.el7.x86_64.rpm
    sha256: c73d74dee6c977bda30983111a290f054a8301797f32a20b550b4242679f057e
    target_directory: binary
    no_hoist: true
  # - url: https://vault.centos.org/7.9.2009/os/Source/SPackages/expat-2.1.0-12.el7.src.rpm
  #   no_hoist: true
  #   folder: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: "distro != "\centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - "*"

requirements:
  host:
    - sysroot_linux-64 2.17.*
  run:
    - sysroot_linux-64 2.17.*

tests:
  script:
    - "echo "it installs!""

about:
  license: MIT
  license_file: {{ SRC_DIR }}/binary/usr/share/doc/expat-2.1.0/COPYING
  summary: (CDT) An XML parser library
  description: |
        This is expat, the C library for parsing XML, written by James Clark. Expat is
        a stream oriented XML parser. This means that you register handlers with the
        parser prior to starting the parse. These handlers are called when the parser
        discovers the associated structures in the document being parsed. A start tag
        is an example of the kind of structures for which you may register handlers.


  homepage: http://www.libexpat.org/

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
