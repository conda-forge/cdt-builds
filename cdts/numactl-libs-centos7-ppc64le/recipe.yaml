schema_version: 1

package:
  name: numactl-libs-conda-ppc64le
  version: 2.0.12

source:
  - url: https://vault.centos.org/altarch/7.9.2009/os/ppc64le/Packages/numactl-libs-2.0.12-5.el7.ppc64le.rpm
    sha256: 645fbaa8c7d906cbe1ff11c219529ab6a68733f5bd01061159c3a12acc521f95
    target_directory: binary
    no_hoist: true
  # - url: https://vault.centos.org/altarch/7.9.2009/os/Source/SPackages/numactl-2.0.12-5.el7.src.rpm
  #   no_hoist: true
  #   folder: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: "distro != "\centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - "*"

requirements:
  host:
    - sysroot_linux-ppc64le 2.17.*
  run:
    - sysroot_linux-ppc64le 2.17.*

tests:
  script:
    - "echo "it installs!""

about:
  license: LGPLv2 and GPLv2
  license_file: {{ SRC_DIR }}/binary/LICENSE_NOT_FOUND
  summary: (CDT) libnuma libraries
  description: |
        numactl-libs provides libnuma, a library to do allocations with NUMA policy in
        applications.


  homepage: https://github.com/numactl/numactl

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
