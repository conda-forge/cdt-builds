schema_version: 1

# TODO: hack to workaround https://github.com/conda-forge/rattler-build-conda-compat/issues/112
context:
  cdt_build_number: 111
  distro: centos7

package:
  name: orbit2-devel-conda-x86_64
  version: 2.14.19

source:
  - url: https://vault.centos.org/7.9.2009/os/x86_64/Packages/ORBit2-devel-2.14.19-13.el7.x86_64.rpm
    sha256: b17c0448ba58703d8ade8e8f698b0bc239d59383a5f45f0a3a3260e9dda37b85
    target_directory: binary
  # - url: https://vault.centos.org/7.9.2009/os/Source/SPackages/ORBit2-2.14.19-13.el7.src.rpm
  #   target_directory: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: distro != "centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - '*'

requirements:
  build:
    - orbit2-conda-x86_64 ==2.14.19 *_${{ cdt_build_number|int + 1000 }}
    - glib2-devel-conda-x86_64 >=2.2.0 *_${{ cdt_build_number|int + 1000 }}
    - libidl-devel-conda-x86_64 >=0.8.2 *_${{ cdt_build_number|int + 1000 }}
    - libarchive
  host:
    - orbit2-conda-x86_64 ==2.14.19 *_${{ cdt_build_number|int + 1000 }}
    - glib2-devel-conda-x86_64 >=2.2.0 *_${{ cdt_build_number|int + 1000 }}
    - libidl-devel-conda-x86_64 >=0.8.2 *_${{ cdt_build_number|int + 1000 }}
    - sysroot_linux-64 2.17.*
  run:
    - orbit2-conda-x86_64 ==2.14.19 *_${{ cdt_build_number|int + 1000 }}
    - glib2-devel-conda-x86_64 >=2.2.0 *_${{ cdt_build_number|int + 1000 }}
    - libidl-devel-conda-x86_64 >=0.8.2 *_${{ cdt_build_number|int + 1000 }}
    - sysroot_linux-64 2.17.*

tests:
  - script:
      - echo "it installs!"

about:
  homepage: http://www.gnome.org/projects/ORBit2
  license: LGPL-2.0-or-later AND GPL-2.0-or-later
  license_file:
    - orbit2-copying
    - orbit2-copying.lib
  summary: (CDT) Development libraries, header files and utilities for ORBit
  description: |
    ORBit is a high-performance CORBA (Common Object Request Broker Architecture)
    ORB (object request broker) with support for the C language.  This package
    contains the header files, libraries and utilities necessary to write programs
    that use CORBA technology. If you want to write such programs, you'll also
    need to install the ORBIT package.

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
