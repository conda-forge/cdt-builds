schema_version: 1

# TODO: hack to workaround https://github.com/conda-forge/rattler-build-conda-compat/issues/112
context:
  cdt_build_number: 111
  distro: alma9

package:
  name: libeconf-conda-x86_64
  version: 0.4.1

source:
  - url: https://repo.almalinux.org/almalinux/9.7/BaseOS/x86_64/os/Packages/libeconf-0.4.1-4.el9.x86_64.rpm
    sha256: 11464e955e108d782c68355e163eede4b00f40d50a9fd7f8d3598386e0fc86f1
    target_directory: binary
  # - url: https://repo.almalinux.org/almalinux/9.7/BaseOS/Source/Packages/libeconf-0.4.1-4.el9.src.rpm
  #   target_directory: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: distro != "alma9"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - "*"

requirements:
  build:
    - libarchive
  host:
    - sysroot_linux-64 2.34.*
  run:
    - sysroot_linux-64 2.34.*

tests:
  - script:
      - echo "it installs!"

about:
  homepage: https://github.com/openSUSE/libeconf
  license: MIT
  license_file: binary/usr/share/licenses/libeconf/LICENSE
  summary: (CDT) Enhanced config file parser library
  description: |
        libeconf is a highly flexible and configurable library to parse and manage
        key=value configuration files. It reads configuration file snippets from
        different directories and builds the final configuration file from it.

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
