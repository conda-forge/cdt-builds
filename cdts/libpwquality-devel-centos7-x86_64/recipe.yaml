schema_version: 1

package:
  name: libpwquality-devel-conda-x86_64
  version: 1.2.3

source:
  - url: https://vault.centos.org/7.9.2009/os/x86_64/Packages/libpwquality-devel-1.2.3-5.el7.x86_64.rpm
    sha256: 57de7989ceb40c64761ca8ffb4d627aeda894b1c722123abaa4a709b13e52eaa
    target_directory: binary
    no_hoist: true
  # - url: https://vault.centos.org/7.9.2009/os/Source/SPackages/libpwquality-1.2.3-5.el7.src.rpm
  #   no_hoist: true
  #   folder: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: "distro != "\centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - "*"

requirements:
  build:
    - libpwquality-conda-x86_64 ==1.2.3 *_{{ cdt_build_number|int + 1000 }}
  host:
    - libpwquality-conda-x86_64 ==1.2.3 *_{{ cdt_build_number|int + 1000 }}
    - sysroot_linux-64 2.17.*
  run:
    - libpwquality-conda-x86_64 ==1.2.3 *_{{ cdt_build_number|int + 1000 }}
    - sysroot_linux-64 2.17.*

tests:
  script:
    - "echo "it installs!""

about:
  license: BSD or GPLv2+
  license_file: {{ SRC_DIR }}/binary/LICENSE_NOT_FOUND
  summary: (CDT) Support for development of applications using the libpwquality library
  description: |
        Files needed for development of applications using the libpwquality library.
        See the pwquality.h header file for the API.


  homepage: https://github.com/libpwquality/libpwquality/

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
