schema_version: 1

# TODO: hack to workaround https://github.com/conda-forge/rattler-build-conda-compat/issues/112
context:
  cdt_build_number: 111
  distro: centos7

package:
  name: pixman-conda-x86_64
  version: 0.34.0

source:
  - url: https://vault.centos.org/7.9.2009/os/x86_64/Packages/pixman-0.34.0-1.el7.x86_64.rpm
    sha256: 4de698c8cf15c28cae3c6e3a7280ae9ee617803533648153891b2fef2f26bb5a
    target_directory: binary
  # - url: https://vault.centos.org/7.9.2009/os/Source/SPackages/pixman-0.34.0-1.el7.src.rpm
  #   target_directory: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: distro != "centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - '*'

requirements:
  build:
    - libarchive
  host:
    - sysroot_linux-64 2.17.*
  run:
    - sysroot_linux-64 2.17.*

tests:
  - script:
      - echo "it installs!"

about:
  homepage: http://cgit.freedesktop.org/pixman/
  license: MIT
  license_file: pixman-license
  summary: (CDT) Pixel manipulation library
  description: |
    Pixman is a pixel manipulation library for X and cairo.

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
