schema_version: 1

# TODO: hack to workaround https://github.com/conda-forge/rattler-build-conda-compat/issues/112
context:
  cdt_build_number: 111
  distro: alma8

package:
  name: audit-libs-devel-conda-ppc64le
  version: 3.1.2

source:
  - url: https://repo.almalinux.org/almalinux/8.10/BaseOS/ppc64le/os/Packages/audit-libs-devel-3.1.2-1.el8_10.1.ppc64le.rpm
    sha256: 6c7a49e0517b4a2aac6e969f9a9f14f03d8d178b60497320a18e961c0f9dc0be
    target_directory: binary
  # - url: https://repo.almalinux.org/almalinux/8.10/BaseOS/Source/Packages/audit-3.1.2-1.el8_10.1.src.rpm
  #   target_directory: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: distro != "alma8"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - '*'

requirements:
  build:
    - audit-libs-conda-ppc64le ==3.1.2 *_${{ cdt_build_number|int + 1000 }}
    - libarchive
  host:
    - audit-libs-conda-ppc64le ==3.1.2 *_${{ cdt_build_number|int + 1000 }}
    - sysroot_linux-ppc64le 2.28.*
  run:
    - audit-libs-conda-ppc64le ==3.1.2 *_${{ cdt_build_number|int + 1000 }}
    - sysroot_linux-ppc64le 2.28.*
tests:
  - script:
      - echo "it installs!"

about:
  homepage: http://people.redhat.com/sgrubb/audit/
  license: LGPL-2.0-or-later
  license_file: audit-libs-copying.lib
  summary: (CDT) Header files for libaudit
  description: |
    The audit-libs-devel package contains the header files needed for developing
    applications that need to use the audit framework libraries.

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
