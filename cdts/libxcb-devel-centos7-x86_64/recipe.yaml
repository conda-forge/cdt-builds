schema_version: 1

package:
  name: libxcb-devel-conda-x86_64
  version: 1.13

source:
  - url: https://vault.centos.org/7.9.2009/os/x86_64/Packages/libxcb-devel-1.13-1.el7.x86_64.rpm
    sha256: 9310147f3b3da6584b17a107830a1b3edc98aa35529c81cfffbe1d518adb6524
    target_directory: binary
    no_hoist: true
  # - url: https://vault.centos.org/7.9.2009/os/Source/SPackages/libxcb-1.13-1.el7.src.rpm
  #   no_hoist: true
  #   folder: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: "distro != "\centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - "*"

requirements:
  build:
    - libxcb-conda-x86_64 ==1.13 *_{{ cdt_build_number|int + 1000 }}
  host:
    - libxcb-conda-x86_64 ==1.13 *_{{ cdt_build_number|int + 1000 }}
    - sysroot_linux-64 2.17.*
  run:
    - libxcb-conda-x86_64 ==1.13 *_{{ cdt_build_number|int + 1000 }}
    - sysroot_linux-64 2.17.*

tests:
  script:
    - "echo "it installs!""

about:
  license: MIT
  license_file: {{ SRC_DIR }}/binary/LICENSE_NOT_FOUND
  summary: (CDT) Development files for libxcb
  description: |
        The libxcb-devel package contains libraries and header files for developing
        applications that use libxcb.


  homepage: https://xcb.freedesktop.org/

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
