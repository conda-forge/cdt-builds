schema_version: 1

# TODO: hack to workaround https://github.com/conda-forge/rattler-build-conda-compat/issues/112
context:
  cdt_build_number: 111
  distro: centos7

package:
  name: mesa-dri-drivers-conda-aarch64
  version: 18.3.4

source:
  - url: https://vault.centos.org/altarch/7.9.2009/os/aarch64/Packages/mesa-dri-drivers-18.3.4-10.el7.aarch64.rpm
    sha256: c8cd7f6759d26246b59adbc8ba958dd4a82f09e24e2a268a1cb4b9f3f34cec3f
    target_directory: binary
  # - url: https://vault.centos.org/altarch/7.9.2009/os/Source/SPackages/mesa-18.3.4-10.el7.src.rpm
  #   target_directory: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: distro != "centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - '*'

requirements:
  build:
    - libdrm-conda-aarch64 >=2.4.83 *_${{ cdt_build_number|int + 1000 }}
    - libarchive
  host:
    - libdrm-conda-aarch64 >=2.4.83 *_${{ cdt_build_number|int + 1000 }}
    - sysroot_linux-aarch64 2.17.*
  run:
    - libdrm-conda-aarch64 >=2.4.83 *_${{ cdt_build_number|int + 1000 }}
    - sysroot_linux-aarch64 2.17.*

tests:
  - script:
      - echo "it installs!"

about:
  homepage: http://www.mesa3d.org
  license: MIT
  license_file: mesa-license
  summary: (CDT) Mesa-based DRI drivers
  description: |
    Mesa-based DRI drivers.

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
