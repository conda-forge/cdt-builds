schema_version: 1

package:
  name: pciutils-libs-conda-aarch64
  version: 3.5.1

source:
  - url: https://vault.centos.org/altarch/7.9.2009/os/aarch64/Packages/pciutils-libs-3.5.1-3.el7.aarch64.rpm
    sha256: 86d8bfccae650bf9893827deedfe70bb502fb54f3fab65a9ca10ad9b3e704c62
    target_directory: binary
    no_hoist: true
  # - url: https://vault.centos.org/altarch/7.9.2009/os/Source/SPackages/pciutils-3.5.1-3.el7.src.rpm
  #   no_hoist: true
  #   folder: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: "distro != "\centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - "*"

requirements:
  host:
    - sysroot_linux-aarch64 2.17.*
  run:
    - sysroot_linux-aarch64 2.17.*

tests:
  script:
    - "echo "it installs!""

about:
  license: GPL-2.0-or-later
  license_file: {{ SRC_DIR }}/binary/usr/share/doc/pciutils-libs-3.5.1/COPYING
  summary: (CDT) Linux PCI library
  description: |
        This package contains a library for inspecting and setting devices connected
        to the PCI bus.


  homepage: http://atrey.karlin.mff.cuni.cz/~mj/pciutils.shtml

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
