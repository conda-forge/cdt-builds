schema_version: 1

package:
  name: pango-devel-conda-x86_64
  version: 1.42.4

source:
  - url: https://vault.centos.org/7.9.2009/os/x86_64/Packages/pango-devel-1.42.4-4.el7_7.x86_64.rpm
    sha256: 9a461610eb324af42a252eb534b65ff00eda503d49c04347a36db6d0615da977
    target_directory: binary
    no_hoist: true
  # - url: https://vault.centos.org/7.9.2009/os/Source/SPackages/pango-1.42.4-4.el7_7.src.rpm
  #   no_hoist: true
  #   folder: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: "distro != "\centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - "*"

requirements:
  build:
    - cairo-devel-conda-x86_64 >=1.12.10 *_{{ cdt_build_number|int + 1000 }}
    - fontconfig-devel-conda-x86_64 >=2.11.91 *_{{ cdt_build_number|int + 1000 }}
    - freetype-devel-conda-x86_64 >=2.1.5 *_{{ cdt_build_number|int + 1000 }}
    - glib2-devel-conda-x86_64 >=2.56.1 *_{{ cdt_build_number|int + 1000 }}
    - pango-conda-x86_64 ==1.42.4 *_{{ cdt_build_number|int + 1000 }}
  host:
    - cairo-devel-conda-x86_64 >=1.12.10 *_{{ cdt_build_number|int + 1000 }}
    - fontconfig-devel-conda-x86_64 >=2.11.91 *_{{ cdt_build_number|int + 1000 }}
    - freetype-devel-conda-x86_64 >=2.1.5 *_{{ cdt_build_number|int + 1000 }}
    - glib2-devel-conda-x86_64 >=2.56.1 *_{{ cdt_build_number|int + 1000 }}
    - pango-conda-x86_64 ==1.42.4 *_{{ cdt_build_number|int + 1000 }}
    - sysroot_linux-64 2.17.*
  run:
    - cairo-devel-conda-x86_64 >=1.12.10 *_{{ cdt_build_number|int + 1000 }}
    - fontconfig-devel-conda-x86_64 >=2.11.91 *_{{ cdt_build_number|int + 1000 }}
    - freetype-devel-conda-x86_64 >=2.1.5 *_{{ cdt_build_number|int + 1000 }}
    - glib2-devel-conda-x86_64 >=2.56.1 *_{{ cdt_build_number|int + 1000 }}
    - pango-conda-x86_64 ==1.42.4 *_{{ cdt_build_number|int + 1000 }}
    - sysroot_linux-64 2.17.*

tests:
  script:
    - "echo "it installs!""

about:
  license: LGPL-2.0-or-later
  license_file: {{ SRC_DIR }}/binary/LICENSE_NOT_FOUND
  summary: (CDT) Development files for pango
  description: |
        The pango-devel package includes the header files and developer documentation
        for the pango package.


  homepage: http://www.pango.org

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
