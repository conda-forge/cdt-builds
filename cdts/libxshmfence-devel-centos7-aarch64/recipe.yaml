schema_version: 1

# TODO: hack to workaround https://github.com/conda-forge/rattler-build-conda-compat/issues/112
context:
  cdt_build_number: 111
  distro: centos7

package:
  name: libxshmfence-devel-conda-aarch64
  version: 1.2

source:
  - url: https://vault.centos.org/altarch/7.9.2009/os/aarch64/Packages/libxshmfence-devel-1.2-1.el7.aarch64.rpm
    sha256: 85ca3eab71b96569616ee54991ade334ced7e56234a96c7870b386824792eb96
    target_directory: binary
  # - url: https://vault.centos.org/altarch/7.9.2009/os/Source/SPackages/libxshmfence-1.2-1.el7.src.rpm
  #   target_directory: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: distro != "centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - '*'

requirements:
  build:
    - libxshmfence-conda-aarch64 ==1.2 *_${{ cdt_build_number|int + 1000 }}
    - libarchive
  host:
    - libxshmfence-conda-aarch64 ==1.2 *_${{ cdt_build_number|int + 1000 }}
    - sysroot_linux-aarch64 2.17.*
  run:
    - libxshmfence-conda-aarch64 ==1.2 *_${{ cdt_build_number|int + 1000 }}
    - sysroot_linux-aarch64 2.17.*

tests:
  - script:
      - echo "it installs!"

about:
  homepage: http://www.x.org/
  license: MIT
  license_file: libxshmfence-license
  summary: (CDT) Development files for libxshmfence
  description: |
    The libxshmfence-devel package contains libraries and header files for
    developing applications that use libxshmfence.

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
