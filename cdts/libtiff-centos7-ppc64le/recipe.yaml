schema_version: 1

# TODO: hack to workaround https://github.com/conda-forge/rattler-build-conda-compat/issues/112
context:
  cdt_build_number: 111
  distro: centos7

package:
  name: libtiff-conda-ppc64le
  version: 4.0.3

source:
  - url: https://vault.centos.org/altarch/7.9.2009/os/ppc64le/Packages/libtiff-4.0.3-35.el7.ppc64le.rpm
    sha256: 5cb1196dc091c47734e1c12e5e9c44e5a78ec7329d762e3cc3dbf6d2b5c7f9cb
    target_directory: binary
  # - url: https://vault.centos.org/altarch/7.9.2009/os/Source/SPackages/libtiff-4.0.3-35.el7.src.rpm
  #   target_directory: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: distro != "centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - "*"

requirements:
  build:
    - libarchive
  host:
    - sysroot_linux-ppc64le 2.17.*
  run:
    - sysroot_linux-ppc64le 2.17.*

tests:
  - script:
      - echo "it installs!"

about:
  homepage: http://www.remotesensing.org/libtiff/
  license: libtiff
  license_file: binary/usr/share/doc/libtiff-4.0.3/COPYRIGHT
  summary: (CDT) Library of functions for manipulating TIFF format image files
  description: |
        The libtiff package contains a library of functions for manipulating TIFF
        (Tagged Image File Format) image format files.  TIFF is a widely used file
        format for bitmapped images.  TIFF files usually end in the .tif extension and
        they are often quite large.  The libtiff package should be installed if you
        need to manipulate TIFF format image files.

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
