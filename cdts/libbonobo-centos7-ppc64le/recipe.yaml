schema_version: 1

# TODO: hack to workaround https://github.com/conda-forge/rattler-build-conda-compat/issues/112
context:
  cdt_build_number: 111
  distro: centos7

package:
  name: libbonobo-conda-ppc64le
  version: 2.32.1

source:
  - url: https://vault.centos.org/altarch/7.9.2009/os/ppc64le/Packages/libbonobo-2.32.1-7.el7.ppc64le.rpm
    sha256: 89ab59605056d702d6ca132eec9837bbcc48f36335ef51dc149a3cec7f064eb3
    target_directory: binary
  # - url: https://vault.centos.org/altarch/7.9.2009/os/Source/SPackages/libbonobo-2.32.1-7.el7.src.rpm
  #   target_directory: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: distro != "centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - '*'

requirements:
  build:
    - libarchive
  host:
    - sysroot_linux-ppc64le 2.17.*
  run:
    - sysroot_linux-ppc64le 2.17.*

tests:
  - script:
      - echo "it installs!"

about:
  homepage: http://ftp.gnome.org
  license: GPL-2.0-or-later AND LGPL-2.0-or-later
  license_file:
    - libbonobo-copying
    - libbonobo-copying.lib
  summary: (CDT) Bonobo component system
  description: |
    Bonobo is a component system based on CORBA, used by the GNOME desktop.

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
