schema_version: 1

# TODO: hack to workaround https://github.com/conda-forge/rattler-build-conda-compat/issues/112
context:
  cdt_build_number: 111
  distro: centos7

package:
  name: libxrender-devel-conda-aarch64
  version: 0.9.10

source:
  - url: https://vault.centos.org/altarch/7.9.2009/os/aarch64/Packages/libXrender-devel-0.9.10-1.el7.aarch64.rpm
    sha256: f6d9da30d0aee0a97cf77aa48186612a8d0f7f10e4eefe0d299a0e3bc460c72f
    target_directory: binary
  # - url: https://vault.centos.org/altarch/7.9.2009/os/Source/SPackages/libXrender-0.9.10-1.el7.src.rpm
  #   target_directory: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: distro != "centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - '*'

requirements:
  build:
    - libxrender-conda-aarch64 ==0.9.10 *_${{ cdt_build_number|int + 1000 }}
    - libarchive
  host:
    - libxrender-conda-aarch64 ==0.9.10 *_${{ cdt_build_number|int + 1000 }}
    - sysroot_linux-aarch64 2.17.*
  run:
    - libxrender-conda-aarch64 ==0.9.10 *_${{ cdt_build_number|int + 1000 }}
    - sysroot_linux-aarch64 2.17.*

tests:
  - script:
      - echo "it installs!"

about:
  homepage: http://www.x.org
  license: MIT
  license_file: libxrender-license
  summary: (CDT) X.Org X11 libXrender development package
  description: |
    X.Org X11 libXrender development package

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
