schema_version: 1

package:
  name: centos-release-conda-aarch64
  version: 7

source:
  - url: https://vault.centos.org/altarch/7.9.2009/os/aarch64/Packages/centos-release-7-9.2009.0.el7.centos.aarch64.rpm
    sha256: 0588cbe9e9b38367f4d5f2e24ecffc08d28c4f65ccf860f478688a832719ebe5
    target_directory: binary
    no_hoist: true
  # - url: https://vault.centos.org/altarch/7.9.2009/os/Source/SPackages/centos-release-7-9.2009.0.el7.centos.src.rpm
  #   no_hoist: true
  #   folder: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: "distro != "\centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - "*"

requirements:
  host:
    - sysroot_linux-aarch64 2.17.*
  run:
    - sysroot_linux-aarch64 2.17.*

tests:
  script:
    - "echo "it installs!""

about:
  license: GPL-2.0-only
  license_file: {{ SRC_DIR }}/binary/LICENSE_NOT_FOUND
  summary: (CDT) CentOS Linux release file
  description: |
        CentOS Linux release files


  homepage: centos-release-conda-aarch64

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
