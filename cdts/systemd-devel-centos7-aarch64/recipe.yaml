schema_version: 1

# TODO: hack to workaround https://github.com/conda-forge/rattler-build-conda-compat/issues/112
context:
  cdt_build_number: 111
  distro: centos7

package:
  name: systemd-devel-conda-aarch64
  version: 219

source:
  - url: https://vault.centos.org/altarch/7.9.2009/os/aarch64/Packages/systemd-devel-219-78.el7.aarch64.rpm
    sha256: 28628e474b93282a893834c87d28606c2ac6c6503d7d4391268b3c2588fab26d
    target_directory: binary
  # - url: https://vault.centos.org/altarch/7.9.2009/os/Source/SPackages/systemd-219-78.el7.src.rpm
  #   target_directory: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: distro != "centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - '*'

requirements:
  build:
    - systemd-conda-aarch64 ==219 *_${{ cdt_build_number|int + 1000 }}
    - systemd-libs-conda-aarch64 ==219 *_${{ cdt_build_number|int + 1000 }}
    - libarchive
  host:
    - systemd-conda-aarch64 ==219 *_${{ cdt_build_number|int + 1000 }}
    - systemd-libs-conda-aarch64 ==219 *_${{ cdt_build_number|int + 1000 }}
    - sysroot_linux-aarch64 2.17.*
  run:
    - systemd-conda-aarch64 ==219 *_${{ cdt_build_number|int + 1000 }}
    - systemd-libs-conda-aarch64 ==219 *_${{ cdt_build_number|int + 1000 }}
    - sysroot_linux-aarch64 2.17.*

tests:
  - script:
      - echo "it installs!"

about:
  homepage: http://www.freedesktop.org/wiki/Software/systemd
  license: LGPL-2.0-or-later AND MIT
  license_file:
    - LICENSE.GPL2
    - LICENSE.LGPL2.1
    - LICENSE.MIT
  summary: (CDT) Development headers for systemd
  description: |
    Development headers and auxiliary files for developing applications for
    systemd.

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
