schema_version: 1

# TODO: hack to workaround https://github.com/conda-forge/rattler-build-conda-compat/issues/112
context:
  cdt_build_number: 111
  distro: centos7

package:
  name: fribidi-conda-aarch64
  version: 1.0.2

source:
  - url: https://vault.centos.org/altarch/7.9.2009/os/aarch64/Packages/fribidi-1.0.2-1.el7_7.1.aarch64.rpm
    sha256: f4914b2c4fde823c5a8ad9bfcaf569a0eee037361f3925411ce1384972c6f252
    target_directory: binary
  # - url: https://vault.centos.org/altarch/7.9.2009/os/Source/SPackages/fribidi-1.0.2-1.el7_7.1.src.rpm
  #   target_directory: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: distro != "centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - "*"

requirements:
  build:
    - libarchive
  host:
    - sysroot_linux-aarch64 2.17.*
  run:
    - sysroot_linux-aarch64 2.17.*

tests:
  - script:
      - echo "it installs!"

about:
  homepage: https://github.com/fribidi/fribidi/
  license: LGPL-2.0-or-later AND LicenseRef-scancode-unicode-ucd
  license_file: binary/usr/share/doc/fribidi-1.0.2/COPYING
  summary: (CDT) Library implementing the Unicode Bidirectional Algorithm
  description: |
        A library to handle bidirectional scripts (for example Hebrew, Arabic), so
        that the display is done in the proper way; while the text data itself is
        always written in logical order.

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
