schema_version: 1

# TODO: hack to workaround https://github.com/conda-forge/rattler-build-conda-compat/issues/112
context:
  cdt_build_number: 111
  distro: centos7

package:
  name: libsoup-conda-aarch64
  version: 2.62.2

source:
  - url: https://vault.centos.org/altarch/7.9.2009/os/aarch64/Packages/libsoup-2.62.2-2.el7.aarch64.rpm
    sha256: 8ac9e9c41e72987adaf7ed3d4634088876c72eb50517ad9f7b0807639b8c0135
    target_directory: binary
  # - url: https://vault.centos.org/altarch/7.9.2009/os/Source/SPackages/libsoup-2.62.2-2.el7.src.rpm
  #   target_directory: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: distro != "centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - '*'

requirements:
  build:
    - glib-networking-conda-aarch64 >=2.38.0 *_${{ cdt_build_number|int + 1000 }}
    - glib2-conda-aarch64 >=2.38.0 *_${{ cdt_build_number|int + 1000 }}
    - libarchive
  host:
    - glib-networking-conda-aarch64 >=2.38.0 *_${{ cdt_build_number|int + 1000 }}
    - glib2-conda-aarch64 >=2.38.0 *_${{ cdt_build_number|int + 1000 }}
    - sysroot_linux-aarch64 2.17.*
  run:
    - glib-networking-conda-aarch64 >=2.38.0 *_${{ cdt_build_number|int + 1000 }}
    - glib2-conda-aarch64 >=2.38.0 *_${{ cdt_build_number|int + 1000 }}
    - sysroot_linux-aarch64 2.17.*

tests:
  - script:
      - echo "it installs!"

about:
  homepage: https://wiki.gnome.org/Projects/libsoup
  license: LGPL-2.0-only
  license_file: libsoup-license
  summary: (CDT) Soup, an HTTP library implementation
  description: |
    Libsoup is an HTTP library implementation in C. It was originally part of a
    SOAP (Simple Object Access Protocol) implementation called Soup, but the SOAP
    and non-SOAP parts have now been split into separate packages.  libsoup uses
    the Glib main loop and is designed to work well with GTK applications. This
    enables GNOME applications to access HTTP servers on the network in a
    completely asynchronous fashion, very similar to the Gtk+ programming model (a
    synchronous operation mode is also supported for those who want it).

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
