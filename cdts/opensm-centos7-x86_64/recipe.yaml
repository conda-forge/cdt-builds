schema_version: 1

# TODO: hack to workaround https://github.com/conda-forge/rattler-build-conda-compat/issues/112
context:
  cdt_build_number: 111
  distro: centos7

package:
  name: opensm-conda-x86_64
  version: 3.3.21

source:
  - url: https://vault.centos.org/7.9.2009/os/x86_64/Packages/opensm-3.3.21-3.el7_8.x86_64.rpm
    sha256: ed062e372b68c0220668936db880a7d38259bb602ba065bc02c499fab28a129a
    target_directory: binary
  # - url: https://vault.centos.org/7.9.2009/os/Source/SPackages/opensm-3.3.21-3.el7_8.src.rpm
  #   target_directory: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: distro != "centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - '*'

requirements:
  build:
    - opensm-libs-conda-x86_64 ==3.3.21 *_${{ cdt_build_number|int + 1000 }}
    - libarchive
  host:
    - opensm-libs-conda-x86_64 ==3.3.21 *_${{ cdt_build_number|int + 1000 }}
    - sysroot_linux-64 2.17.*
  run:
    - opensm-libs-conda-x86_64 ==3.3.21 *_${{ cdt_build_number|int + 1000 }}
    - sysroot_linux-64 2.17.*

tests:
  - script:
      - echo "it installs!"

about:
  homepage: https://github.com/linux-rdma/opensm
  license: GPL-2.0-only OR LicenseRef-Callaway-BSD
  license_file:
    - opensm-license
  summary: (CDT) OpenIB InfiniBand Subnet Manager and management utilities
  description: |
    OpenSM is the OpenIB project's Subnet Manager for Infiniband networks. The
    subnet manager is run as a system daemon on one of the machines in the
    infiniband fabric to manage the fabric's routing state.  This package also
    contains various tools for diagnosing and testing Infiniband networks that can
    be used from any machine and do not need to be run on a machine running the
    opensm daemon.

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
