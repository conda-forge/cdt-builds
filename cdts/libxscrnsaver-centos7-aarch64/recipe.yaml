schema_version: 1

# TODO: hack to workaround https://github.com/conda-forge/rattler-build-conda-compat/issues/112
context:
  cdt_build_number: 111
  distro: centos7

package:
  name: libxscrnsaver-conda-aarch64
  version: 1.2.2

source:
  - url: https://vault.centos.org/altarch/7.9.2009/os/aarch64/Packages/libXScrnSaver-1.2.2-6.1.el7.aarch64.rpm
    sha256: bd762e8016cf40a39c22ecdc63e0fff8211b2cfc6f4a8a8f7f16e55d4c446431
    target_directory: binary
  # - url: https://vault.centos.org/altarch/7.9.2009/os/Source/SPackages/libXScrnSaver-1.2.2-6.1.el7.src.rpm
  #   target_directory: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: distro != "centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - '*'

requirements:
  build:
    - libarchive
  host:
    - sysroot_linux-aarch64 2.17.*
  run:
    - sysroot_linux-aarch64 2.17.*

tests:
  - script:
      - echo "it installs!"

about:
  homepage: http://www.x.org
  license: MIT
  license_file: libxscrnsaver-license
  summary: (CDT) X.Org X11 libXss runtime library
  description: |
    X.Org X11 libXss runtime library

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
