schema_version: 1

# TODO: hack to workaround https://github.com/conda-forge/rattler-build-conda-compat/issues/112
context:
  cdt_build_number: 111
  distro: centos7

package:
  name: centos-release-conda-x86_64
  version: 7

source:
  - url: https://vault.centos.org/7.9.2009/os/x86_64/Packages/centos-release-7-9.2009.0.el7.centos.x86_64.rpm
    sha256: 084d7a4cd25d9ecb77dd607072b72829c28602438d96804a4637d371d9c20d1f
    target_directory: binary
  # - url: https://vault.centos.org/7.9.2009/os/Source/SPackages/centos-release-7-9.2009.0.el7.centos.src.rpm
  #   target_directory: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: distro != "centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - '*'

requirements:
  build:
    - libarchive
  host:
    - sysroot_linux-64 2.17.*
  run:
    - sysroot_linux-64 2.17.*

tests:
  - script:
      - echo "it installs!"

about:
  homepage: https://vault.centos.org/7.9.2009/os/x86_64/Packages/centos-release-7-9.2009.0.el7.centos.x86_64.rpm
  license: GPL-2.0-only
  license_file: centos-release-license
  summary: (CDT) CentOS Linux release file
  description: |
    CentOS Linux release files

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
