schema_version: 1

package:
  name: libxrandr-conda-aarch64
  version: 1.5.1

source:
  - url: https://vault.centos.org/altarch/7.9.2009/os/aarch64/Packages/libXrandr-1.5.1-2.el7.aarch64.rpm
    sha256: ff6a386f3b3ac3b67a03159c279baf899a1b848c37e4bc1cb43dbd52bf24e24b
    target_directory: binary
    no_hoist: true
  # - url: https://vault.centos.org/altarch/7.9.2009/os/Source/SPackages/libXrandr-1.5.1-2.el7.src.rpm
  #   no_hoist: true
  #   folder: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: "distro != "\centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - "*"

requirements:
  build:
    - libx11-conda-aarch64 >=1.6.0 *_{{ cdt_build_number|int + 1000 }}
  host:
    - libx11-conda-aarch64 >=1.6.0 *_{{ cdt_build_number|int + 1000 }}
    - sysroot_linux-aarch64 2.17.*
  run:
    - libx11-conda-aarch64 >=1.6.0 *_{{ cdt_build_number|int + 1000 }}
    - sysroot_linux-aarch64 2.17.*

tests:
  script:
    - "echo "it installs!""

about:
  license: MIT
  license_file: {{ SRC_DIR }}/binary/usr/share/doc/libXrandr-1.5.1/COPYING
  summary: (CDT) X.Org X11 libXrandr runtime library
  description: |
        X.Org X11 libXrandr runtime library


  homepage: http://www.x.org

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
