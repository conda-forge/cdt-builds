schema_version: 1

# TODO: hack to workaround https://github.com/conda-forge/rattler-build-conda-compat/issues/112
context:
  cdt_build_number: 111
  distro: centos7

package:
  name: libpwquality-devel-conda-ppc64le
  version: 1.2.3

source:
  - url: https://vault.centos.org/altarch/7.9.2009/os/ppc64le/Packages/libpwquality-devel-1.2.3-5.el7.ppc64le.rpm
    sha256: 3073ddcaea5a039bc0f1f0a67b209fdc886bff80152c5bf9801461402abac0f6
    target_directory: binary
  # - url: https://vault.centos.org/altarch/7.9.2009/os/Source/SPackages/libpwquality-1.2.3-5.el7.src.rpm
  #   target_directory: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: distro != "centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - '*'

requirements:
  build:
    - libpwquality-conda-ppc64le ==1.2.3 *_${{ cdt_build_number|int + 1000 }}
    - libarchive
  host:
    - libpwquality-conda-ppc64le ==1.2.3 *_${{ cdt_build_number|int + 1000 }}
    - sysroot_linux-ppc64le 2.17.*
  run:
    - libpwquality-conda-ppc64le ==1.2.3 *_${{ cdt_build_number|int + 1000 }}
    - sysroot_linux-ppc64le 2.17.*

tests:
  - script:
      - echo "it installs!"

about:
  homepage: https://github.com/libpwquality/libpwquality/
  license: LicenseRef-Callaway-BSD OR GPL-2.0-or-later
  license_file: libpwquality-copying
  summary: (CDT) Support for development of applications using the libpwquality library
  description: |
    Files needed for development of applications using the libpwquality library.
    See the pwquality.h header file for the API.

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
