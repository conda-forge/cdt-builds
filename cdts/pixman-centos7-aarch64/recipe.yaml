schema_version: 1

package:
  name: pixman-conda-aarch64
  version: 0.34.0

source:
  - url: https://vault.centos.org/altarch/7.9.2009/os/aarch64/Packages/pixman-0.34.0-1.el7.aarch64.rpm
    sha256: 2270e54db1c1cd17657eaca24c05c016bb923b6651ae06958775d7834dbd20a7
    target_directory: binary
    no_hoist: true
  # - url: https://vault.centos.org/altarch/7.9.2009/os/Source/SPackages/pixman-0.34.0-1.el7.src.rpm
  #   no_hoist: true
  #   folder: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: "distro != "\centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - "*"

requirements:
  host:
    - sysroot_linux-aarch64 2.17.*
  run:
    - sysroot_linux-aarch64 2.17.*

tests:
  script:
    - "echo "it installs!""

about:
  license: MIT
  license_file: {{ SRC_DIR }}/binary/LICENSE_NOT_FOUND
  summary: (CDT) Pixel manipulation library
  description: |
        Pixman is a pixel manipulation library for X and cairo.


  homepage: http://cgit.freedesktop.org/pixman/

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
