schema_version: 1

package:
  name: libxdamage-devel-conda-ppc64le
  version: 1.1.4

source:
  - url: https://vault.centos.org/altarch/7.9.2009/os/ppc64le/Packages/libXdamage-devel-1.1.4-4.1.el7.ppc64le.rpm
    sha256: 237e40fda7e1e625dff31b02383e7b402d9c9383a1fbe3d4c04f653fbc4b5a41
    target_directory: binary
    no_hoist: true
  # - url: https://vault.centos.org/altarch/7.9.2009/os/Source/SPackages/libXdamage-1.1.4-4.1.el7.src.rpm
  #   no_hoist: true
  #   folder: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: "distro != "\centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - "*"

requirements:
  build:
    - libxdamage-conda-ppc64le ==1.1.4 *_{{ cdt_build_number|int + 1000 }}
  host:
    - libxdamage-conda-ppc64le ==1.1.4 *_{{ cdt_build_number|int + 1000 }}
    - sysroot_linux-ppc64le 2.17.*
  run:
    - libxdamage-conda-ppc64le ==1.1.4 *_{{ cdt_build_number|int + 1000 }}
    - sysroot_linux-ppc64le 2.17.*

tests:
  script:
    - "echo "it installs!""

about:
  license: MIT
  license_file: {{ SRC_DIR }}/binary/LICENSE_NOT_FOUND
  summary: (CDT) Development files for libXdamage
  description: |
        X.Org X11 libXdamage development package.


  homepage: http://www.x.org

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
