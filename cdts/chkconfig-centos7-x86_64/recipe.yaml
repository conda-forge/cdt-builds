schema_version: 1

# TODO: hack to workaround https://github.com/conda-forge/rattler-build-conda-compat/issues/112
context:
  cdt_build_number: 111
  distro: centos7

package:
  name: chkconfig-conda-x86_64
  version: 1.7.6

source:
  - url: https://vault.centos.org/7.9.2009/os/x86_64/Packages/chkconfig-1.7.6-1.el7.x86_64.rpm
    sha256: 646df8aeff8fdbd206070c2cd91bdb50003035c9925d0605c52a80cc081c38dc
    target_directory: binary
  # - url: https://vault.centos.org/7.9.2009/os/Source/SPackages/chkconfig-1.7.6-1.el7.src.rpm
  #   target_directory: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: distro != "centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - "*"

requirements:
  build:
    - libarchive
  host:
    - sysroot_linux-64 2.17.*
  run:
    - sysroot_linux-64 2.17.*

tests:
  - script:
      - echo "it installs!"

about:
  homepage: https://github.com/fedora-sysv/chkconfig
  license: GPL-2.0-only
  license_file: binary/usr/share/licenses/chkconfig-1.7.6/COPYING
  summary: (CDT) A system tool for maintaining the /etc/rc*.d hierarchy
  description: |
        Chkconfig is a basic system utility.  It updates and queries runlevel
        information for system services.  Chkconfig manipulates the numerous symbolic
        links in /etc/rc.d, to relieve system administrators of some of the drudgery
        of manually editing the symbolic links.

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
