schema_version: 1

package:
  name: libxtst-conda-x86_64
  version: 1.2.3

source:
  - url: https://vault.centos.org/7.9.2009/os/x86_64/Packages/libXtst-1.2.3-1.el7.x86_64.rpm
    sha256: fb26618b371e304889912c79aa009388aaa17f3b08fdce9512d70f3957fe18e2
    target_directory: binary
    no_hoist: true
  # - url: https://vault.centos.org/7.9.2009/os/Source/SPackages/libXtst-1.2.3-1.el7.src.rpm
  #   no_hoist: true
  #   folder: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: "distro != "\centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - "*"

requirements:
  build:
    - libx11-conda-x86_64 >=1.5.99.902 *_{{ cdt_build_number|int + 1000 }}
  host:
    - libx11-conda-x86_64 >=1.5.99.902 *_{{ cdt_build_number|int + 1000 }}
    - sysroot_linux-64 2.17.*
  run:
    - libx11-conda-x86_64 >=1.5.99.902 *_{{ cdt_build_number|int + 1000 }}
    - sysroot_linux-64 2.17.*

tests:
  script:
    - "echo "it installs!""

about:
  license: MIT
  license_file: {{ SRC_DIR }}/binary/usr/share/doc/libXtst-1.2.3/COPYING
  summary: (CDT) X.Org X11 libXtst runtime library
  description: |
        X.Org X11 libXtst runtime library


  homepage: http://www.x.org

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
