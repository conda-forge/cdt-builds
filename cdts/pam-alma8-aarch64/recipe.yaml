schema_version: 1

package:
  name: pam-conda-aarch64
  version: 1.3.1

source:
  - url: https://repo.almalinux.org/almalinux/8.10/BaseOS/aarch64/os/Packages/pam-1.3.1-39.el8_10.aarch64.rpm
    sha256: 534d201186cb937bd5c9cc46b7f26b771107cf087eb21b17668d628f2bb6dfc4
    target_directory: binary
    no_hoist: true
  # - url: https://repo.almalinux.org/almalinux/8.10/BaseOS/Source/Packages/pam-1.3.1-39.el8_10.src.rpm
  #   no_hoist: true
  #   folder: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: "distro != "\alma8"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - "*"

requirements:
  build:
    - audit-libs-conda-aarch64 >=1.0.8 *_{{ cdt_build_number|int + 1000 }}
    - glibc-conda-aarch64 >=2.3.90 *_{{ cdt_build_number|int + 1000 }}
    - libpwquality-conda-aarch64 >=0.9.9 *_{{ cdt_build_number|int + 1000 }}
    - libselinux-conda-aarch64 >=1.33.2 *_{{ cdt_build_number|int + 1000 }}
  host:
    - audit-libs-conda-aarch64 >=1.0.8 *_{{ cdt_build_number|int + 1000 }}
    - glibc-conda-aarch64 >=2.3.90 *_{{ cdt_build_number|int + 1000 }}
    - libpwquality-conda-aarch64 >=0.9.9 *_{{ cdt_build_number|int + 1000 }}
    - libselinux-conda-aarch64 >=1.33.2 *_{{ cdt_build_number|int + 1000 }}
    - sysroot_linux-aarch64 2.28.*
  run:
    - audit-libs-conda-aarch64 >=1.0.8 *_{{ cdt_build_number|int + 1000 }}
    - glibc-conda-aarch64 >=2.3.90 *_{{ cdt_build_number|int + 1000 }}
    - libpwquality-conda-aarch64 >=0.9.9 *_{{ cdt_build_number|int + 1000 }}
    - libselinux-conda-aarch64 >=1.33.2 *_{{ cdt_build_number|int + 1000 }}
    - sysroot_linux-aarch64 2.28.*

tests:
  script:
    - "echo "it installs!""

about:
  license: BSD and GPLv2+
  license_file: {{ SRC_DIR }}/binary/usr/share/licenses/pam/Copyright
  summary: (CDT) An extensible library which provides authentication for applications
  description: |
        PAM (Pluggable Authentication Modules) is a system security tool that allows
        system administrators to set authentication policy without having to recompile
        programs that handle authentication.


  homepage: http://www.linux-pam.org/

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
