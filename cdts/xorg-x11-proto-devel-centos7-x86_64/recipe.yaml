schema_version: 1

# TODO: hack to workaround https://github.com/conda-forge/rattler-build-conda-compat/issues/112
context:
  cdt_build_number: 111
  distro: centos7

package:
  name: xorg-x11-proto-devel-conda-x86_64
  version: 2018.4

source:
  - url: https://vault.centos.org/7.9.2009/os/x86_64/Packages/xorg-x11-proto-devel-2018.4-1.el7.noarch.rpm
    sha256: ed33c07dd19aae73edaef6cb5daeca44fae87aa7fba16d5de6aad4c244f5232f
    target_directory: binary
  # - url: https://vault.centos.org/7.9.2009/os/Source/SPackages/xorg-x11-proto-devel-2018.4-1.el7.src.rpm
  #   target_directory: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: distro != "centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - '*'

requirements:
  build:
    - libarchive
  host:
    - sysroot_linux-64 2.17.*
  run:
    - sysroot_linux-64 2.17.*

tests:
  - script:
      - echo "it installs!"

about:
  homepage: https://www.x.org
  license: MIT
  license_file:
    - COPYING-applewmproto
    - COPYING-bigreqsproto
    - COPYING-compositeproto
    - COPYING-damageproto
    - COPYING-dmxproto
    - COPYING-dri2proto
    - COPYING-dri3proto
    - COPYING-evieproto
    - COPYING-fixesproto
    - COPYING-fontcacheproto
    - COPYING-fontsproto
    - COPYING-glproto
    - COPYING-inputproto
    - COPYING-kbproto
    - COPYING-lg3dproto
    - COPYING-panoramixproto
    - COPYING-pmproto
    - COPYING-presentproto
    - COPYING-printproto
    - COPYING-randrproto
    - COPYING-recordproto
    - COPYING-renderproto
    - COPYING-resourceproto
    - COPYING-scrnsaverproto
    - COPYING-trapproto
    - COPYING-videoproto
    - COPYING-windowswmproto
    - COPYING-x11proto
    - COPYING-xcmiscproto
    - COPYING-xextproto
    - COPYING-xf86bigfontproto
    - COPYING-xf86dgaproto
    - COPYING-xf86driproto
    - COPYING-xf86miscproto
    - COPYING-xf86rushproto
    - COPYING-xf86vidmodeproto
    - COPYING-xineramaproto
  summary: (CDT) X.Org X11 Protocol headers
  description: |
    X.Org X11 Protocol headers

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
