schema_version: 1

package:
  name: python-javapackages-conda-ppc64le
  version: 3.4.1

source:
  - url: https://vault.centos.org/altarch/7.9.2009/os/ppc64le/Packages/python-javapackages-3.4.1-11.el7.noarch.rpm
    sha256: 8d867ffbfaf2bc76f13c1fc624e12d75f84e0ff22636a52171e20af579c63801
    target_directory: binary
    no_hoist: true
  # - url: https://vault.centos.org/altarch/7.9.2009/os/Source/SPackages/javapackages-tools-3.4.1-11.el7.src.rpm
  #   no_hoist: true
  #   folder: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: "distro != "\centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - "*"

requirements:
  host:
    - sysroot_linux-ppc64le 2.17.*
  run:
    - sysroot_linux-ppc64le 2.17.*

tests:
  script:
    - "echo "it installs!""

about:
  license: BSD
  license_file: {{ SRC_DIR }}/binary/usr/share/doc/python-javapackages-3.4.1/LICENSE
  summary: (CDT) Module for handling various files for Java packaging
  description: |
        Module for handling, querying and manipulating of various files for Java
        packaging in Linux distributions


  homepage: https://fedorahosted.org/javapackages/

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
