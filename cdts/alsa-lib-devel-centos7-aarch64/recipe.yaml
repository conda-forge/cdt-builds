schema_version: 1

# TODO: hack to workaround https://github.com/conda-forge/rattler-build-conda-compat/issues/112
context:
  cdt_build_number: 111
  distro: centos7

package:
  name: alsa-lib-devel-conda-aarch64
  version: 1.1.8

source:
  - url: https://vault.centos.org/altarch/7.9.2009/os/aarch64/Packages/alsa-lib-devel-1.1.8-1.el7.aarch64.rpm
    sha256: 9c378db289e157bd775ac6cf2f9c9dd2fbfc1376806d89d6ccd0f9d3c75e272d
    target_directory: binary
  # - url: https://vault.centos.org/altarch/7.9.2009/os/Source/SPackages/alsa-lib-1.1.8-1.el7.src.rpm
  #   target_directory: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: distro != "centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - '*'

requirements:
  build:
    - alsa-lib-conda-aarch64 ==1.1.8 *_${{ cdt_build_number|int + 1000 }}
    - libarchive
  host:
    - alsa-lib-conda-aarch64 ==1.1.8 *_${{ cdt_build_number|int + 1000 }}
    - sysroot_linux-aarch64 2.17.*
  run:
    - alsa-lib-conda-aarch64 ==1.1.8 *_${{ cdt_build_number|int + 1000 }}
    - sysroot_linux-aarch64 2.17.*

tests:
  - script:
      - echo "it installs!"

about:
  homepage: http://www.alsa-project.org/
  license: LGPL-2.0-or-later
  license_file: alsa-lib-license
  summary: (CDT) Development files from the ALSA library
  description: |
    The Advanced Linux Sound Architecture (ALSA) provides audio and MIDI
    functionality to the Linux operating system.  This package includes the ALSA
    development libraries for developing against the ALSA libraries and
    interfaces.

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
