schema_version: 1

# TODO: hack to workaround https://github.com/conda-forge/rattler-build-conda-compat/issues/112
context:
  cdt_build_number: 111
  distro: alma9

package:
  name: audit-libs-devel-conda-ppc64le
  version: 3.1.5

source:
  - url: https://repo.almalinux.org/almalinux/9.7/AppStream/ppc64le/os/Packages/audit-libs-devel-3.1.5-7.el9.ppc64le.rpm
    sha256: a2ee33fd48b7ea622f58d84a9524ded9c7c841c4644d1bd07fb52d85645f3f42
    target_directory: binary
  # - url: https://repo.almalinux.org/almalinux/9.7/AppStream/Source/Packages/audit-3.1.5-7.el9.src.rpm
  #   target_directory: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: distro != "alma9"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - '*'

requirements:
  build:
    - audit-libs-conda-ppc64le ==3.1.5 *_${{ cdt_build_number|int + 1000 }}
    - libarchive
  host:
    - audit-libs-conda-ppc64le ==3.1.5 *_${{ cdt_build_number|int + 1000 }}
    - sysroot_linux-ppc64le 2.34.*
  run:
    - audit-libs-conda-ppc64le ==3.1.5 *_${{ cdt_build_number|int + 1000 }}
    - sysroot_linux-ppc64le 2.34.*
tests:
  - script:
      - echo "it installs!"

about:
  homepage: http://people.redhat.com/sgrubb/audit/
  license: LGPL-2.0-or-later
  license_file: audit-libs-copying.lib
  summary: (CDT) Header files for libaudit
  description: |
    The audit-libs-devel package contains the header files needed for developing
    applications that need to use the audit framework libraries.

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
