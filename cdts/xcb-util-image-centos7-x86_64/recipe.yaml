schema_version: 1

# TODO: hack to workaround https://github.com/conda-forge/rattler-build-conda-compat/issues/112
context:
  cdt_build_number: 111
  distro: centos7

package:
  name: xcb-util-image-conda-x86_64
  version: 0.4.0

source:
  - url: https://vault.centos.org/7.9.2009/os/x86_64/Packages/xcb-util-image-0.4.0-2.el7.x86_64.rpm
    sha256: b6a0703e6284b36b7add437fa2e44d987c6de502447a511d6b880b9a3197dfa9
    target_directory: binary
  # - url: https://vault.centos.org/7.9.2009/os/Source/SPackages/xcb-util-image-0.4.0-2.el7.src.rpm
  #   target_directory: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: distro != "centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - '*'

requirements:
  build:
    - libarchive
  host:
    - sysroot_linux-64 2.17.*
  run:
    - sysroot_linux-64 2.17.*

tests:
  - script:
      - echo "it installs!"

about:
  homepage: http://xcb.freedesktop.org
  license: MIT
  license_file: xcb-util-image-license
  summary: (CDT) Port of Xlib's XImage and XShmImage functions on top of libxcb
  description: |
    XCB util-image module provides the following library:    - image: Port of
    Xlib's XImage and XShmImage functions.

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
