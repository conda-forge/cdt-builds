schema_version: 1

package:
  name: libnl-conda-aarch64
  version: 1.1.4

source:
  - url: https://vault.centos.org/altarch/7.9.2009/os/aarch64/Packages/libnl-1.1.4-3.el7.aarch64.rpm
    sha256: 0e5a75584ba4311dec833a2e904282178b05af458bf7659a456704178f978b4f
    target_directory: binary
    no_hoist: true
  # - url: https://vault.centos.org/altarch/7.9.2009/os/Source/SPackages/libnl-1.1.4-3.el7.src.rpm
  #   no_hoist: true
  #   folder: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: "distro != "\centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - "*"

requirements:
  host:
    - sysroot_linux-aarch64 2.17.*
  run:
    - sysroot_linux-aarch64 2.17.*

tests:
  script:
    - "echo "it installs!""

about:
  license: LGPLv2
  license_file: {{ SRC_DIR }}/binary/usr/share/doc/libnl-1.1.4/COPYING
  summary: (CDT) Convenience library for kernel netlink sockets
  description: |
        This package contains a convenience library to simplify using the Linux
        kernel's netlink sockets interface for network manipulation


  homepage: http://www.infradead.org/~tgr/libnl/

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
