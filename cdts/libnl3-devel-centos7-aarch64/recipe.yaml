schema_version: 1

package:
  name: libnl3-devel-conda-aarch64
  version: 3.2.28

source:
  - url: https://vault.centos.org/altarch/7.9.2009/os/aarch64/Packages/libnl3-devel-3.2.28-4.el7.aarch64.rpm
    sha256: 794fff19448e675e73c2136b9df075b1f57897352429b6160d25af83149f361b
    target_directory: binary
    no_hoist: true
  # - url: https://vault.centos.org/altarch/7.9.2009/os/Source/SPackages/libnl3-3.2.28-4.el7.src.rpm
  #   no_hoist: true
  #   folder: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: "distro != "\centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - "*"

requirements:
  build:
    - libnl3-conda-aarch64 ==3.2.28 *_{{ cdt_build_number|int + 1000 }}
    - libnl3-cli-conda-aarch64 ==3.2.28 *_{{ cdt_build_number|int + 1000 }}
  host:
    - libnl3-conda-aarch64 ==3.2.28 *_{{ cdt_build_number|int + 1000 }}
    - libnl3-cli-conda-aarch64 ==3.2.28 *_{{ cdt_build_number|int + 1000 }}
    - sysroot_linux-aarch64 2.17.*
  run:
    - libnl3-conda-aarch64 ==3.2.28 *_{{ cdt_build_number|int + 1000 }}
    - libnl3-cli-conda-aarch64 ==3.2.28 *_{{ cdt_build_number|int + 1000 }}
    - sysroot_linux-aarch64 2.17.*

tests:
  script:
    - "echo "it installs!""

about:
  license: LGPLv2
  license_file: {{ SRC_DIR }}/binary/usr/share/doc/libnl3-devel-3.2.28/COPYING
  summary: (CDT) Libraries and headers for using libnl3
  description: |
        This package contains various headers for using libnl3


  homepage: http://www.infradead.org/~tgr/libnl/

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
