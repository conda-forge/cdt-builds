schema_version: 1

package:
  name: libglvnd-egl-conda-ppc64le
  version: 1.0.1

source:
  - url: https://vault.centos.org/altarch/7.9.2009/os/ppc64le/Packages/libglvnd-egl-1.0.1-0.8.git5baa1e5.el7.ppc64le.rpm
    sha256: 2deabe3bf691a41bd02a9778d9adad9bc72a2f5cd359e90992cbc2a4983e4f3e
    target_directory: binary
    no_hoist: true
  # - url: https://vault.centos.org/altarch/7.9.2009/os/Source/SPackages/libglvnd-1.0.1-0.8.git5baa1e5.el7.src.rpm
  #   no_hoist: true
  #   folder: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: "distro != "\centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - "*"

requirements:
  build:
    - libglvnd-conda-ppc64le ==1.0.1 *_{{ cdt_build_number|int + 1000 }}
    - mesa-libegl-conda-ppc64le >=13.0.4 *_{{ cdt_build_number|int + 1000 }}
  host:
    - libglvnd-conda-ppc64le ==1.0.1 *_{{ cdt_build_number|int + 1000 }}
    - mesa-libegl-conda-ppc64le >=13.0.4 *_{{ cdt_build_number|int + 1000 }}
    - sysroot_linux-ppc64le 2.17.*
  run:
    - libglvnd-conda-ppc64le ==1.0.1 *_{{ cdt_build_number|int + 1000 }}
    - mesa-libegl-conda-ppc64le >=13.0.4 *_{{ cdt_build_number|int + 1000 }}
    - sysroot_linux-ppc64le 2.17.*

tests:
  script:
    - "echo "it installs!""

about:
  license: MIT
  license_file: {{ SRC_DIR }}/binary/LICENSE_NOT_FOUND
  summary: (CDT) EGL support for libglvnd
  description: |
        libEGL are the common dispatch interface for the EGL API.


  homepage: https://github.com/NVIDIA/libglvnd

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
