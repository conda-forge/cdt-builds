schema_version: 1

# TODO: hack to workaround https://github.com/conda-forge/rattler-build-conda-compat/issues/112
context:
  cdt_build_number: 111
  distro: centos7

package:
  name: freetype-devel-conda-aarch64
  version: 2.8

source:
  - url: https://vault.centos.org/altarch/7.9.2009/os/aarch64/Packages/freetype-devel-2.8-14.el7.aarch64.rpm
    sha256: 3d92a7257f32f71dda1ff521b80cb50ae42ae0cdf5a39bc2ed5f9d4ca1ee80aa
    target_directory: binary
  # - url: https://vault.centos.org/altarch/7.9.2009/os/Source/SPackages/freetype-2.8-14.el7.src.rpm
  #   target_directory: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: distro != "centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - '*'

requirements:
  build:
    - freetype-conda-aarch64 ==2.8 *_${{ cdt_build_number|int + 1000 }}
    - libarchive
  host:
    - freetype-conda-aarch64 ==2.8 *_${{ cdt_build_number|int + 1000 }}
    - sysroot_linux-aarch64 2.17.*
  run:
    - freetype-conda-aarch64 ==2.8 *_${{ cdt_build_number|int + 1000 }}
    - sysroot_linux-aarch64 2.17.*

tests:
  - script:
      - echo "it installs!"

about:
  homepage: http://www.freetype.org
  license: ( FTL OR GPL-2.0-or-later ) AND LicenseRef-Callaway-BSD AND MIT AND LicenseRef-Callaway-Public-Domain AND zlib-acknowledgement
  license_file: freetype-license.txt
  summary: (CDT) FreeType development libraries and header files
  description: |
    The freetype-devel package includes the static libraries and header files for
    the FreeType font rendering engine.  Install freetype-devel if you want to
    develop programs which will use FreeType.

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
