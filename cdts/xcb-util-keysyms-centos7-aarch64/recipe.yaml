schema_version: 1

# TODO: hack to workaround https://github.com/conda-forge/rattler-build-conda-compat/issues/112
context:
  cdt_build_number: 111
  distro: centos7

package:
  name: xcb-util-keysyms-conda-aarch64
  version: 0.4.0

source:
  - url: https://vault.centos.org/altarch/7.9.2009/os/aarch64/Packages/xcb-util-keysyms-0.4.0-1.el7.aarch64.rpm
    sha256: 8d932752b26eed6fefe5dd4c9a4bcbcd6532d210c42bf0117a718f5ca6e32177
    target_directory: binary
  # - url: https://vault.centos.org/altarch/7.9.2009/os/Source/SPackages/xcb-util-keysyms-0.4.0-1.el7.src.rpm
  #   target_directory: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: distro != "centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - '*'

requirements:
  build:
    - libarchive
  host:
    - sysroot_linux-aarch64 2.17.*
  run:
    - sysroot_linux-aarch64 2.17.*

tests:
  - script:
      - echo "it installs!"

about:
  homepage: http://xcb.freedesktop.org
  license: MIT
  license_file: xcb-util-keysyms-license
  summary: (CDT) Standard X key constants and keycodes conversion on top of libxcb
  description: |
    XCB util-keysyms module provides the following library:    - keysyms: Standard
    X key constants and conversion to/from keycodes.

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
