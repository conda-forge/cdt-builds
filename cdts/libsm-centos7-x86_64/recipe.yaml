schema_version: 1

package:
  name: libsm-conda-x86_64
  version: 1.2.2

source:
  - url: https://vault.centos.org/7.9.2009/os/x86_64/Packages/libSM-1.2.2-2.el7.x86_64.rpm
    sha256: 3a1f996031e2a1ce991547720319eb92463d9ac667d697bb7b496bdd0722bc62
    target_directory: binary
    no_hoist: true
  # - url: https://vault.centos.org/7.9.2009/os/Source/SPackages/libSM-1.2.2-2.el7.src.rpm
  #   no_hoist: true
  #   folder: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: "distro != "\centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - "*"

requirements:
  host:
    - sysroot_linux-64 2.17.*
  run:
    - sysroot_linux-64 2.17.*

tests:
  script:
    - "echo "it installs!""

about:
  license: MIT
  license_file: {{ SRC_DIR }}/binary/usr/share/doc/libSM-1.2.2/COPYING
  summary: (CDT) X.Org X11 SM runtime library
  description: |
        The X.Org X11 SM (Session Management) runtime library.


  homepage: http://www.x.org

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
