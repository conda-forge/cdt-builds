schema_version: 1

package:
  name: mesa-libgbm-devel-conda-aarch64
  version: 23.1.4

source:
  - url: https://repo.almalinux.org/almalinux/8.10/PowerTools/aarch64/os/Packages/mesa-libgbm-devel-23.1.4-4.el8_10.alma.1.aarch64.rpm
    sha256: 02690521b257c13ee2222b03e14f5bf807b3db1f6eb649dd4d6bc15dc059d1c2
    target_directory: binary
    no_hoist: true
  # - url: https://repo.almalinux.org/almalinux/8.10/PowerTools/Source/Packages/mesa-23.1.4-4.el8_10.alma.1.src.rpm
  #   no_hoist: true
  #   folder: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: "distro != "\alma8"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - "*"

requirements:
  build:
    - mesa-libgbm-conda-aarch64 ==23.1.4 *_{{ cdt_build_number|int + 1000 }}
  host:
    - mesa-libgbm-conda-aarch64 ==23.1.4 *_{{ cdt_build_number|int + 1000 }}
    - sysroot_linux-aarch64 2.28.*
  run:
    - mesa-libgbm-conda-aarch64 ==23.1.4 *_{{ cdt_build_number|int + 1000 }}
    - sysroot_linux-aarch64 2.28.*

tests:
  script:
    - "echo "it installs!""

about:
  license: MIT
  license_file: {{ SRC_DIR }}/binary/LICENSE_NOT_FOUND
  summary: (CDT) Mesa libgbm development package
  description: |
        Mesa libgbm development package.


  homepage: http://www.mesa3d.org

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
