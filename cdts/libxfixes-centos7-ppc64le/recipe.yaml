schema_version: 1

# TODO: hack to workaround https://github.com/conda-forge/rattler-build-conda-compat/issues/112
context:
  cdt_build_number: 111
  distro: centos7

package:
  name: libxfixes-conda-ppc64le
  version: 5.0.3

source:
  - url: https://vault.centos.org/altarch/7.9.2009/os/ppc64le/Packages/libXfixes-5.0.3-1.el7.ppc64le.rpm
    sha256: 223ac82df2de0a8cda9a94a1797ae6d657fb099bf91c3a1c1391be516771e3d6
    target_directory: binary
  # - url: https://vault.centos.org/altarch/7.9.2009/os/Source/SPackages/libXfixes-5.0.3-1.el7.src.rpm
  #   target_directory: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: distro != "centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - "*"

requirements:
  build:
    - libx11-conda-ppc64le >=1.6 *_${{ cdt_build_number|int + 1000 }}
    - libarchive
  host:
    - libx11-conda-ppc64le >=1.6 *_${{ cdt_build_number|int + 1000 }}
    - sysroot_linux-ppc64le 2.17.*
  run:
    - libx11-conda-ppc64le >=1.6 *_${{ cdt_build_number|int + 1000 }}
    - sysroot_linux-ppc64le 2.17.*

tests:
  - script:
      - echo "it installs!"

about:
  homepage: http://www.x.org
  license: MIT
  license_file: binary/usr/share/doc/libXfixes-5.0.3/COPYING
  summary: (CDT) X Fixes library
  description: |
        X Fixes library.

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
