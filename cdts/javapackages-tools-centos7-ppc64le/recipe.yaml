schema_version: 1

# TODO: hack to workaround https://github.com/conda-forge/rattler-build-conda-compat/issues/112
context:
  cdt_build_number: 111
  distro: centos7

package:
  name: javapackages-tools-conda-ppc64le
  version: 3.4.1

source:
  - url: https://vault.centos.org/altarch/7.9.2009/os/ppc64le/Packages/javapackages-tools-3.4.1-11.el7.noarch.rpm
    sha256: cb9d2fd9d743bf4cb28b4afec7e8d1891fcca6f63f00ba7a60aadfe337527e1c
    target_directory: binary
  # - url: https://vault.centos.org/altarch/7.9.2009/os/Source/SPackages/javapackages-tools-3.4.1-11.el7.src.rpm
  #   target_directory: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: distro != "centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - "*"

requirements:
  build:
    - python-javapackages-conda-ppc64le ==3.4.1 *_${{ cdt_build_number|int + 1000 }}
    - libarchive
  host:
    - python-javapackages-conda-ppc64le ==3.4.1 *_${{ cdt_build_number|int + 1000 }}
    - sysroot_linux-ppc64le 2.17.*
  run:
    - python-javapackages-conda-ppc64le ==3.4.1 *_${{ cdt_build_number|int + 1000 }}
    - sysroot_linux-ppc64le 2.17.*

tests:
  - script:
      - echo "it installs!"

about:
  homepage: https://fedorahosted.org/javapackages/
  license: LicenseRef-Callaway-BSD
  license_file: binary/usr/share/doc/javapackages-tools-3.4.1/LICENSE
  summary: (CDT) Macros and scripts for Java packaging support
  description: |
        This package provides macros and scripts to support Java packaging.

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
