schema_version: 1

# TODO: hack to workaround https://github.com/conda-forge/rattler-build-conda-compat/issues/112
context:
  cdt_build_number: 111
  distro: centos7

package:
  name: fontconfig-conda-ppc64le
  version: 2.13.0

source:
  - url: https://vault.centos.org/altarch/7.9.2009/os/ppc64le/Packages/fontconfig-2.13.0-4.3.el7.ppc64le.rpm
    sha256: 2eabc434571ad4a5b5f8096f65d776b28c1df20992f36f19b87b52b2c30263bb
    target_directory: binary
  # - url: https://vault.centos.org/altarch/7.9.2009/os/Source/SPackages/fontconfig-2.13.0-4.3.el7.src.rpm
  #   target_directory: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: distro != "centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - "*"

requirements:
  build:
    - freetype-conda-ppc64le >=2.8 *_${{ cdt_build_number|int + 1000 }}
    - libarchive
  host:
    - freetype-conda-ppc64le >=2.8 *_${{ cdt_build_number|int + 1000 }}
    - sysroot_linux-ppc64le 2.17.*
  run:
    - freetype-conda-ppc64le >=2.8 *_${{ cdt_build_number|int + 1000 }}
    - sysroot_linux-ppc64le 2.17.*

tests:
  - script:
      - echo "it installs!"

about:
  homepage: http://fontconfig.org
  license: MIT AND LicenseRef-Callaway-Public-Domain AND LicenseRef-scancode-unicode-ucd
  license_file: binary/usr/share/doc/fontconfig-2.13.0/COPYING
  summary: (CDT) Font configuration and customization library
  description: |
        Fontconfig is designed to locate fonts within the system and select them
        according to requirements specified by applications.

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
