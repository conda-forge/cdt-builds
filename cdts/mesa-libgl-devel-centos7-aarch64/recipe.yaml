schema_version: 1

package:
  name: mesa-libgl-devel-conda-aarch64
  version: 18.3.4

source:
  - url: https://vault.centos.org/altarch/7.9.2009/os/aarch64/Packages/mesa-libGL-devel-18.3.4-10.el7.aarch64.rpm
    sha256: 4414f0b094fef1ec6e2ca623d2e06407f91bf76c0762003768f92383d2328c6c
    target_directory: binary
    no_hoist: true
  # - url: https://vault.centos.org/altarch/7.9.2009/os/Source/SPackages/mesa-18.3.4-10.el7.src.rpm
  #   no_hoist: true
  #   folder: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: "distro != "\centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - "*"

requirements:
  build:
    - mesa-khr-devel-conda-aarch64 ==18.3.4 *_{{ cdt_build_number|int + 1000 }}
    - mesa-libgl-conda-aarch64 ==18.3.4 *_{{ cdt_build_number|int + 1000 }}
  host:
    - mesa-khr-devel-conda-aarch64 ==18.3.4 *_{{ cdt_build_number|int + 1000 }}
    - mesa-libgl-conda-aarch64 ==18.3.4 *_{{ cdt_build_number|int + 1000 }}
    - sysroot_linux-aarch64 2.17.*
  run:
    - mesa-khr-devel-conda-aarch64 ==18.3.4 *_{{ cdt_build_number|int + 1000 }}
    - mesa-libgl-conda-aarch64 ==18.3.4 *_{{ cdt_build_number|int + 1000 }}
    - sysroot_linux-aarch64 2.17.*

tests:
  script:
    - "echo "it installs!""

about:
  license: MIT
  license_file: {{ SRC_DIR }}/binary/LICENSE_NOT_FOUND
  summary: (CDT) Mesa libGL development package
  description: |
        Mesa libGL development package


  homepage: http://www.mesa3d.org

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
