schema_version: 1

# TODO: hack to workaround https://github.com/conda-forge/rattler-build-conda-compat/issues/112
context:
  cdt_build_number: 111
  distro: centos7

package:
  name: kernel-headers-conda-aarch64
  version: 4.18.0

source:
  - url: https://vault.centos.org/altarch/7.9.2009/os/aarch64/Packages/kernel-headers-4.18.0-193.28.1.el7.aarch64.rpm
    sha256: 56fffc40800cd7c30830009c860f04c8dba1110a6271efd804a0bb01e0bdf8a4
    target_directory: binary
  # - url: https://vault.centos.org/altarch/7.9.2009/os/Source/SPackages/kernel-4.18.0-193.28.1.el7.src.rpm
  #   target_directory: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: distro != "centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - '*'

requirements:
  build:
    - libarchive
  host:
    - sysroot_linux-aarch64 2.17.*
  run:
    - sysroot_linux-aarch64 2.17.*

tests:
  - script:
      - echo "it installs!"

about:
  homepage: http://www.kernel.org/
  license: GPL-2.0-only AND LicenseRef-Callaway-Redistributable-no-modification-permitted
  summary: (CDT) Header files for the Linux kernel for use by glibc
  description: |
    Kernel-headers includes the C header files that specify the interface between
    the Linux kernel and userspace libraries and programs.  The header files
    define structures and constants that are needed for building most standard
    programs and are also needed for rebuilding the glibc package.

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
