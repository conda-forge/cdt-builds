schema_version: 1

# TODO: hack to workaround https://github.com/conda-forge/rattler-build-conda-compat/issues/112
context:
  cdt_build_number: 111
  distro: alma9

package:
  name: cracklib-devel-conda-x86_64
  version: 2.9.6

source:
  - url: https://repo.almalinux.org/almalinux/9.7/CRB/x86_64/os/Packages/cracklib-devel-2.9.6-27.el9.x86_64.rpm
    sha256: 942b8904ac97fcd1b58378ce1d7d244eda57e47202768b56b0c7114cb58e3a61
    target_directory: binary
  # - url: https://repo.almalinux.org/almalinux/9.7/CRB/Source/Packages/cracklib-2.9.6-27.el9.src.rpm
  #   target_directory: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: distro != "alma9"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - '*'

requirements:
  build:
    - cracklib-conda-x86_64 ==2.9.6 *_${{ cdt_build_number|int + 1000 }}
    - libarchive
  host:
    - cracklib-conda-x86_64 ==2.9.6 *_${{ cdt_build_number|int + 1000 }}
    - sysroot_linux-64 2.34.*
  run:
    - cracklib-conda-x86_64 ==2.9.6 *_${{ cdt_build_number|int + 1000 }}
    - sysroot_linux-64 2.34.*

tests:
  - script:
      - echo "it installs!"

about:
  homepage: http://sourceforge.net/projects/cracklib/
  license: LGPL-2.0-or-later
  license_file: cracklib-copying.lib
  summary: (CDT) Development files needed for building applications which use cracklib
  description: |
    The cracklib-devel package contains the header files and libraries needed for
    compiling applications which use cracklib.

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
