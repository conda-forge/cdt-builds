schema_version: 1

# TODO: hack to workaround https://github.com/conda-forge/rattler-build-conda-compat/issues/112
context:
  cdt_build_number: 111
  distro: centos7

package:
  name: fontconfig-devel-conda-ppc64le
  version: 2.13.0

source:
  - url: https://vault.centos.org/altarch/7.9.2009/os/ppc64le/Packages/fontconfig-devel-2.13.0-4.3.el7.ppc64le.rpm
    sha256: 1bff2b180c8edfa3c9f5305a87c45faec167a24787c1088381855d829ed0e97e
    target_directory: binary
  # - url: https://vault.centos.org/altarch/7.9.2009/os/Source/SPackages/fontconfig-2.13.0-4.3.el7.src.rpm
  #   target_directory: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: distro != "centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - '*'

requirements:
  build:
    - fontconfig-conda-ppc64le ==2.13.0 *_${{ cdt_build_number|int + 1000 }}
    - freetype-devel-conda-ppc64le >=2.8 *_${{ cdt_build_number|int + 1000 }}
    - libarchive
  host:
    - fontconfig-conda-ppc64le ==2.13.0 *_${{ cdt_build_number|int + 1000 }}
    - freetype-devel-conda-ppc64le >=2.8 *_${{ cdt_build_number|int + 1000 }}
    - sysroot_linux-ppc64le 2.17.*
  run:
    - fontconfig-conda-ppc64le ==2.13.0 *_${{ cdt_build_number|int + 1000 }}
    - freetype-devel-conda-ppc64le >=2.8 *_${{ cdt_build_number|int + 1000 }}
    - sysroot_linux-ppc64le 2.17.*

tests:
  - script:
      - echo "it installs!"

about:
  homepage: http://fontconfig.org
  license: MIT AND LicenseRef-Callaway-Public-Domain AND LicenseRef-scancode-unicode-ucd
  license_file: fontconfig-copying
  summary: (CDT) Font configuration and customization library
  description: |
    The fontconfig-devel package includes the header files, and developer docs for
    the fontconfig package.  Install fontconfig-devel if you want to develop
    programs which will use fontconfig.

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
