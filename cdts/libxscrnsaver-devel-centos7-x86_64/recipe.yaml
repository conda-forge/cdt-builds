schema_version: 1

package:
  name: libxscrnsaver-devel-conda-x86_64
  version: 1.2.2

source:
  - url: https://vault.centos.org/7.9.2009/os/x86_64/Packages/libXScrnSaver-devel-1.2.2-6.1.el7.x86_64.rpm
    sha256: 648dba880fd76aa92a3d81163e487f9f41c33e573a8cb4ca168837b447ad3636
    target_directory: binary
    no_hoist: true
  # - url: https://vault.centos.org/7.9.2009/os/Source/SPackages/libXScrnSaver-1.2.2-6.1.el7.src.rpm
  #   no_hoist: true
  #   folder: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: "distro != "\centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - "*"

requirements:
  build:
    - libxscrnsaver-conda-x86_64 ==1.2.2 *_{{ cdt_build_number|int + 1000 }}
  host:
    - libxscrnsaver-conda-x86_64 ==1.2.2 *_{{ cdt_build_number|int + 1000 }}
    - sysroot_linux-64 2.17.*
  run:
    - libxscrnsaver-conda-x86_64 ==1.2.2 *_{{ cdt_build_number|int + 1000 }}
    - sysroot_linux-64 2.17.*

tests:
  script:
    - "echo "it installs!""

about:
  license: MIT
  license_file: {{ SRC_DIR }}/binary/LICENSE_NOT_FOUND
  summary: (CDT) X.Org X11 libXScrnSaver development package
  description: |
        X.Org X11 libXss development package


  homepage: http://www.x.org

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
