schema_version: 1

package:
  name: libibmad-devel-conda-ppc64le
  version: 1.3.13

source:
  - url: https://vault.centos.org/altarch/7.9.2009/os/ppc64le/Packages/libibmad-devel-1.3.13-1.el7.ppc64le.rpm
    sha256: 224ffbac3d622e475a3f2e189ca5be479774327e1fdc7f64f939cfb98e4a92c9
    target_directory: binary
    no_hoist: true
  # - url: https://vault.centos.org/altarch/7.9.2009/os/Source/SPackages/libibmad-1.3.13-1.el7.src.rpm
  #   no_hoist: true
  #   folder: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: "distro != "\centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - "*"

requirements:
  build:
    - libibmad-conda-ppc64le ==1.3.13 *_{{ cdt_build_number|int + 1000 }}
  host:
    - libibmad-conda-ppc64le ==1.3.13 *_{{ cdt_build_number|int + 1000 }}
    - sysroot_linux-ppc64le 2.17.*
  run:
    - libibmad-conda-ppc64le ==1.3.13 *_{{ cdt_build_number|int + 1000 }}
    - sysroot_linux-ppc64le 2.17.*

tests:
  script:
    - "echo "it installs!""

about:
  license: GPLv2 or BSD
  license_file: {{ SRC_DIR }}/binary/LICENSE_NOT_FOUND
  summary: (CDT) Development files for the libibmad library
  description: |
        Development files for the libibmad library.


  homepage: http://www.openfabrics.org/

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
