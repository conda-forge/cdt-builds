schema_version: 1

package:
  name: mesa-libgl-conda-x86_64
  version: 18.3.4

source:
  - url: https://vault.centos.org/7.9.2009/os/x86_64/Packages/mesa-libGL-18.3.4-10.el7.x86_64.rpm
    sha256: e8a8967ff175bfef2c9c0504493339950194d193a8014593c88f4de1c61767c4
    target_directory: binary
    no_hoist: true
  # - url: https://vault.centos.org/7.9.2009/os/Source/SPackages/mesa-18.3.4-10.el7.src.rpm
  #   no_hoist: true
  #   folder: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: "distro != "\centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - "*"

requirements:
  build:
    - libdrm-conda-x86_64 >=2.4.83 *_{{ cdt_build_number|int + 1000 }}
    - libglvnd-glx-conda-x86_64 >=1.0.1 *_{{ cdt_build_number|int + 1000 }}
    - mesa-libglapi-conda-x86_64 ==18.3.4 *_{{ cdt_build_number|int + 1000 }}
  host:
    - libdrm-conda-x86_64 >=2.4.83 *_{{ cdt_build_number|int + 1000 }}
    - libglvnd-glx-conda-x86_64 >=1.0.1 *_{{ cdt_build_number|int + 1000 }}
    - mesa-libglapi-conda-x86_64 ==18.3.4 *_{{ cdt_build_number|int + 1000 }}
    - sysroot_linux-64 2.17.*
  run:
    - libdrm-conda-x86_64 >=2.4.83 *_{{ cdt_build_number|int + 1000 }}
    - libglvnd-glx-conda-x86_64 >=1.0.1 *_{{ cdt_build_number|int + 1000 }}
    - mesa-libglapi-conda-x86_64 ==18.3.4 *_{{ cdt_build_number|int + 1000 }}
    - sysroot_linux-64 2.17.*

tests:
  script:
    - "echo "it installs!""

about:
  license: MIT
  license_file: {{ SRC_DIR }}/binary/LICENSE_NOT_FOUND
  summary: (CDT) Mesa libGL runtime libraries and DRI drivers
  description: |
        Mesa libGL runtime library.


  homepage: http://www.mesa3d.org

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
