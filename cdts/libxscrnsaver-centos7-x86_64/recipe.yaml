schema_version: 1

# TODO: hack to workaround https://github.com/conda-forge/rattler-build-conda-compat/issues/112
context:
  cdt_build_number: 111
  distro: centos7

package:
  name: libxscrnsaver-conda-x86_64
  version: 1.2.2

source:
  - url: https://vault.centos.org/7.9.2009/os/x86_64/Packages/libXScrnSaver-1.2.2-6.1.el7.x86_64.rpm
    sha256: ea8e5b4a6c0c7b4d8d4c59c8839f90a81e21a7d2b80db7621777d55164c13d93
    target_directory: binary
  # - url: https://vault.centos.org/7.9.2009/os/Source/SPackages/libXScrnSaver-1.2.2-6.1.el7.src.rpm
  #   target_directory: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: distro != "centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - '*'

requirements:
  build:
    - libarchive
  host:
    - sysroot_linux-64 2.17.*
  run:
    - sysroot_linux-64 2.17.*

tests:
  - script:
      - echo "it installs!"

about:
  homepage: http://www.x.org
  license: MIT
  license_file: libxscrnsaver-license
  summary: (CDT) X.Org X11 libXss runtime library
  description: |
    X.Org X11 libXss runtime library

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
