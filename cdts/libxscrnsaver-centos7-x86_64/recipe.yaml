schema_version: 1

package:
  name: libxscrnsaver-conda-x86_64
  version: 1.2.2

source:
  - url: https://vault.centos.org/7.9.2009/os/x86_64/Packages/libXScrnSaver-1.2.2-6.1.el7.x86_64.rpm
    sha256: ea8e5b4a6c0c7b4d8d4c59c8839f90a81e21a7d2b80db7621777d55164c13d93
    target_directory: binary
    no_hoist: true
  # - url: https://vault.centos.org/7.9.2009/os/Source/SPackages/libXScrnSaver-1.2.2-6.1.el7.src.rpm
  #   no_hoist: true
  #   folder: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: "distro != "\centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - "*"

requirements:
  host:
    - sysroot_linux-64 2.17.*
  run:
    - sysroot_linux-64 2.17.*

tests:
  script:
    - "echo "it installs!""

about:
  license: MIT
  license_file: {{ SRC_DIR }}/binary/usr/share/doc/libXScrnSaver-1.2.2/COPYING
  summary: (CDT) X.Org X11 libXss runtime library
  description: |
        X.Org X11 libXss runtime library


  homepage: http://www.x.org

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
