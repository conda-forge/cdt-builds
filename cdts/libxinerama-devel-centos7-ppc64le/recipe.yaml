schema_version: 1

# TODO: hack to workaround https://github.com/conda-forge/rattler-build-conda-compat/issues/112
context:
  cdt_build_number: 111
  distro: centos7

package:
  name: libxinerama-devel-conda-ppc64le
  version: 1.1.3

source:
  - url: https://vault.centos.org/altarch/7.9.2009/os/ppc64le/Packages/libXinerama-devel-1.1.3-2.1.el7.ppc64le.rpm
    sha256: 95da52d3175a6bb7dd334b92be25c037a9955fd766de785178fbb6f443de2975
    target_directory: binary
  # - url: https://vault.centos.org/altarch/7.9.2009/os/Source/SPackages/libXinerama-1.1.3-2.1.el7.src.rpm
  #   target_directory: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: distro != "centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - '*'

requirements:
  build:
    - libxinerama-conda-ppc64le ==1.1.3 *_${{ cdt_build_number|int + 1000 }}
    - libarchive
  host:
    - libxinerama-conda-ppc64le ==1.1.3 *_${{ cdt_build_number|int + 1000 }}
    - sysroot_linux-ppc64le 2.17.*
  run:
    - libxinerama-conda-ppc64le ==1.1.3 *_${{ cdt_build_number|int + 1000 }}
    - sysroot_linux-ppc64le 2.17.*

tests:
  - script:
      - echo "it installs!"

about:
  homepage: http://www.x.org
  license: MIT
  license_file: libxinerma-license
  summary: (CDT) X.Org X11 libXinerama development package
  description: |
    X.Org X11 libXinerama development package

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
