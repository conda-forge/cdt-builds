package:
  name: audit-libs-conda-x86_64
  version: 3.1.5

source:
  - url: https://repo.almalinux.org/almalinux/9.7/BaseOS/x86_64/os/Packages/audit-libs-3.1.5-7.el9.x86_64.rpm
    sha256: 3550d2f54bc253a69bd5b467c3482299d5bfdc38cd798d014f7cb4ea7f6d400e
    no_hoist: true
    folder: binary
  # - url: https://repo.almalinux.org/almalinux/9.7/BaseOS/Source/Packages/audit-3.1.5-7.el9.src.rpm
  #   no_hoist: true
  #   folder: source

build:
  number: {{ cdt_build_number|int + 1000 }}
  noarch: generic
  binary_relocation: false
  detect_binary_files_with_prefix: false
  missing_dso_whitelist:
    - '*'
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  skip: true  # [distro != "alma9"]

requirements:
  host:
    - sysroot_linux-64 2.34.*
  run:
    - sysroot_linux-64 2.34.*

test:
  commands:
    - echo "it installs!"

about:
  home: http://people.redhat.com/sgrubb/audit/
  license: LGPL-2.0-or-later
  license_family: LGPL
  license_file: audit-libs-copying.lib
  summary: (CDT) Dynamic library for libaudit
  description: |
    The audit-libs package contains the dynamic libraries needed for applications
    to use the audit framework.

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
