schema_version: 1

package:
  name: mesa-libegl-devel-conda-aarch64
  version: 18.3.4

source:
  - url: https://vault.centos.org/altarch/7.9.2009/os/aarch64/Packages/mesa-libEGL-devel-18.3.4-10.el7.aarch64.rpm
    sha256: bea0470994bf198eccf8e77da11d25ed459c17564245b2ff2414e88a34cc327b
    target_directory: binary
    no_hoist: true
  # - url: https://vault.centos.org/altarch/7.9.2009/os/Source/SPackages/mesa-18.3.4-10.el7.src.rpm
  #   no_hoist: true
  #   folder: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: "distro != "\centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - "*"

requirements:
  build:
    - mesa-khr-devel-conda-aarch64 ==18.3.4 *_{{ cdt_build_number|int + 1000 }}
    - mesa-libegl-conda-aarch64 ==18.3.4 *_{{ cdt_build_number|int + 1000 }}
  host:
    - mesa-khr-devel-conda-aarch64 ==18.3.4 *_{{ cdt_build_number|int + 1000 }}
    - mesa-libegl-conda-aarch64 ==18.3.4 *_{{ cdt_build_number|int + 1000 }}
    - sysroot_linux-aarch64 2.17.*
  run:
    - mesa-khr-devel-conda-aarch64 ==18.3.4 *_{{ cdt_build_number|int + 1000 }}
    - mesa-libegl-conda-aarch64 ==18.3.4 *_{{ cdt_build_number|int + 1000 }}
    - sysroot_linux-aarch64 2.17.*

tests:
  script:
    - "echo "it installs!""

about:
  license: MIT
  license_file: {{ SRC_DIR }}/binary/LICENSE_NOT_FOUND
  summary: (CDT) Mesa libEGL development package
  description: |
        Mesa libEGL development package


  homepage: http://www.mesa3d.org

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
