schema_version: 1

# TODO: hack to workaround https://github.com/conda-forge/rattler-build-conda-compat/issues/112
context:
  cdt_build_number: 111
  distro: centos7

package:
  name: pciutils-libs-conda-ppc64le
  version: 3.5.1

source:
  - url: https://vault.centos.org/altarch/7.9.2009/os/ppc64le/Packages/pciutils-libs-3.5.1-3.el7.ppc64le.rpm
    sha256: 647e0559e0cfb35ee9068102b28f973df03870bf4a6c51fa936815d563533a0d
    target_directory: binary
  # - url: https://vault.centos.org/altarch/7.9.2009/os/Source/SPackages/pciutils-3.5.1-3.el7.src.rpm
  #   target_directory: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: distro != "centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - '*'

requirements:
  build:
    - libarchive
  host:
    - sysroot_linux-ppc64le 2.17.*
  run:
    - sysroot_linux-ppc64le 2.17.*

tests:
  - script:
      - echo "it installs!"

about:
  homepage: http://atrey.karlin.mff.cuni.cz/~mj/pciutils.shtml
  license: GPL-2.0-or-later
  license_file: pciutils-license
  summary: (CDT) Linux PCI library
  description: |
    This package contains a library for inspecting and setting devices connected
    to the PCI bus.

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
