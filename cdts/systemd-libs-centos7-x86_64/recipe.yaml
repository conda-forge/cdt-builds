schema_version: 1

# TODO: hack to workaround https://github.com/conda-forge/rattler-build-conda-compat/issues/112
context:
  cdt_build_number: 111
  distro: centos7

package:
  name: systemd-libs-conda-x86_64
  version: 219

source:
  - url: https://vault.centos.org/7.9.2009/os/x86_64/Packages/systemd-libs-219-78.el7.x86_64.rpm
    sha256: 14a555e00c219e1be8eea0d3bb683579059cba07ccfb9c559d6ee1a991d73e66
    target_directory: binary
  # - url: https://vault.centos.org/7.9.2009/os/Source/SPackages/systemd-219-78.el7.src.rpm
  #   target_directory: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: distro != "centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - '*'

requirements:
  build:
    - libarchive
  host:
    - sysroot_linux-64 2.17.*
  run:
    - sysroot_linux-64 2.17.*

tests:
  - script:
      - echo "it installs!"

about:
  homepage: http://www.freedesktop.org/wiki/Software/systemd
  license: LGPL-2.0-or-later AND MIT
  license_file:
    - LICENSE.LGPL2.1
    - LICENSE.MIT
  summary: (CDT) systemd libraries
  description: |
    Libraries for systemd and udev, as well as the systemd PAM module.

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
