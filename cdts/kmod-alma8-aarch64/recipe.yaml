schema_version: 1

# TODO: hack to workaround https://github.com/conda-forge/rattler-build-conda-compat/issues/112
context:
  cdt_build_number: 111
  distro: alma8

package:
  name: kmod-conda-aarch64
  version: 25

source:
  - url: https://repo.almalinux.org/almalinux/8.10/BaseOS/aarch64/os/Packages/kmod-25-20.el8.aarch64.rpm
    sha256: ec7e952a4305c9b666f7288733aab43e1ce382753a082911072b515c2385d39b
    target_directory: binary
  # - url: https://repo.almalinux.org/almalinux/8.10/BaseOS/Source/Packages/kmod-25-20.el8.src.rpm
  #   target_directory: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: distro != "alma8"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - '*'

requirements:
  build:
    - libarchive
  host:
    - sysroot_linux-aarch64 2.28.*
  run:
    - sysroot_linux-aarch64 2.28.*

tests:
  - script:
      - echo "it installs!"

about:
  homepage: http://git.kernel.org/?p=utils/kernel/kmod/kmod.git;a=summary
  license: GPL-2.0-or-later
  license_file: kmod-copying
  summary: (CDT) Linux kernel module management utilities
  description: |
    The kmod package provides various programs needed for automatic loading and
    unloading of modules under 2.6, 3.x, and later kernels, as well as other
    module management programs. Device drivers and filesystems are two examples of
    loaded and unloaded modules.

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
