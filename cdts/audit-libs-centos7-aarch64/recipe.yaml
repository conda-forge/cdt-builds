schema_version: 1

package:
  name: audit-libs-conda-aarch64
  version: 2.8.5

source:
  - url: https://vault.centos.org/altarch/7.9.2009/os/aarch64/Packages/audit-libs-2.8.5-4.el7.aarch64.rpm
    sha256: c67ba5a600a6a94da1ee52fffc4855b6f6c75ae4ad1a568aafec1538849d8395
    target_directory: binary
    no_hoist: true
  # - url: https://vault.centos.org/altarch/7.9.2009/os/Source/SPackages/audit-2.8.5-4.el7.src.rpm
  #   no_hoist: true
  #   folder: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: "distro != "\centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - "*"

requirements:
  host:
    - sysroot_linux-aarch64 2.17.*
  run:
    - sysroot_linux-aarch64 2.17.*

tests:
  script:
    - "echo "it installs!""

about:
  license: LGPL-2.0-or-later
  license_file: {{ SRC_DIR }}/binary/LICENSE_NOT_FOUND
  summary: (CDT) Dynamic library for libaudit
  description: |
        The audit-libs package contains the dynamic libraries needed for applications
        to use the audit framework.


  homepage: http://people.redhat.com/sgrubb/audit/

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
