schema_version: 1

package:
  name: libxcb-conda-x86_64
  version: 1.13

source:
  - url: https://vault.centos.org/7.9.2009/os/x86_64/Packages/libxcb-1.13-1.el7.x86_64.rpm
    sha256: 125d6cdbea06799872b77b6322bf5cb107d7c0c70218827bf6b649f08ca527c5
    target_directory: binary
    no_hoist: true
  # - url: https://vault.centos.org/7.9.2009/os/Source/SPackages/libxcb-1.13-1.el7.src.rpm
  #   no_hoist: true
  #   folder: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: "distro != "\centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - "*"

requirements:
  host:
    - sysroot_linux-64 2.17.*
  run:
    - sysroot_linux-64 2.17.*

tests:
  script:
    - "echo "it installs!""

about:
  license: MIT
  license_file: {{ SRC_DIR }}/binary/LICENSE_NOT_FOUND
  summary: (CDT) A C binding to the X11 protocol
  description: |
        The X protocol C-language Binding (XCB) is a replacement for Xlib featuring a
        small footprint, latency hiding, direct access to the protocol, improved
        threading support, and extensibility.


  homepage: https://xcb.freedesktop.org/

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
