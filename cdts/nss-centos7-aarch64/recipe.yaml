schema_version: 1

# TODO: hack to workaround https://github.com/conda-forge/rattler-build-conda-compat/issues/112
context:
  cdt_build_number: 111
  distro: centos7

package:
  name: nss-conda-aarch64
  version: 3.44.0

source:
  - url: https://vault.centos.org/altarch/7.9.2009/os/aarch64/Packages/nss-3.44.0-7.el7_7.aarch64.rpm
    sha256: e62d16e9fea97fc4253510568f454c3c0cfd9310b072f23980b78f9cc29d4831
    target_directory: binary
  # - url: https://vault.centos.org/altarch/7.9.2009/os/Source/SPackages/nss-3.44.0-7.el7_7.src.rpm
  #   target_directory: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: distro != "centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - '*'

requirements:
  build:
    - nspr-conda-aarch64 >=4.21.0 *_${{ cdt_build_number|int + 1000 }}
    - nss-softokn-conda-aarch64 >=3.44.0 *_${{ cdt_build_number|int + 1000 }}
    - nss-util-conda-aarch64 >=3.44.0 *_${{ cdt_build_number|int + 1000 }}
    - libarchive
  host:
    - nspr-conda-aarch64 >=4.21.0 *_${{ cdt_build_number|int + 1000 }}
    - nss-softokn-conda-aarch64 >=3.44.0 *_${{ cdt_build_number|int + 1000 }}
    - nss-util-conda-aarch64 >=3.44.0 *_${{ cdt_build_number|int + 1000 }}
    - sysroot_linux-aarch64 2.17.*
  run:
    - nspr-conda-aarch64 >=4.21.0 *_${{ cdt_build_number|int + 1000 }}
    - nss-softokn-conda-aarch64 >=3.44.0 *_${{ cdt_build_number|int + 1000 }}
    - nss-util-conda-aarch64 >=3.44.0 *_${{ cdt_build_number|int + 1000 }}
    - sysroot_linux-aarch64 2.17.*

tests:
  - script:
      - echo "it installs!"

about:
  homepage: http://www.mozilla.org/projects/security/pki/nss/
  license: MPL-2.0
  license_file: nss-license
  summary: (CDT) Network Security Services
  description: |
    Network Security Services (NSS) is a set of libraries designed to support
    cross-platform development of security-enabled client and server applications.
    Applications built with NSS can support SSL v2 and v3, TLS, PKCS #5, PKCS #7,
    PKCS #11, PKCS #12, S/MIME, X.509 v3 certificates, and other security
    standards.

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
