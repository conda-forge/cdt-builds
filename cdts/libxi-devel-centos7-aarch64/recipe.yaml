schema_version: 1

# TODO: hack to workaround https://github.com/conda-forge/rattler-build-conda-compat/issues/112
context:
  cdt_build_number: 111
  distro: centos7

package:
  name: libxi-devel-conda-aarch64
  version: 1.7.9

source:
  - url: https://vault.centos.org/altarch/7.9.2009/os/aarch64/Packages/libXi-devel-1.7.9-1.el7.aarch64.rpm
    sha256: c1d5faf91377c1ccf168e3c2183929d163165f5f253a529106197ea463f2a726
    target_directory: binary
  # - url: https://vault.centos.org/altarch/7.9.2009/os/Source/SPackages/libXi-1.7.9-1.el7.src.rpm
  #   target_directory: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: distro != "centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - '*'

requirements:
  build:
    - libxi-conda-aarch64 ==1.7.9 *_${{ cdt_build_number|int + 1000 }}
    - libarchive
  host:
    - libxi-conda-aarch64 ==1.7.9 *_${{ cdt_build_number|int + 1000 }}
    - sysroot_linux-aarch64 2.17.*
  run:
    - libxi-conda-aarch64 ==1.7.9 *_${{ cdt_build_number|int + 1000 }}
    - sysroot_linux-aarch64 2.17.*

tests:
  - script:
      - echo "it installs!"

about:
  homepage: http://www.x.org
  license: MIT
  license_file: libxi-license
  summary: (CDT) X.Org X11 libXi development package
  description: |
    X.Org X11 libXi development package

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
