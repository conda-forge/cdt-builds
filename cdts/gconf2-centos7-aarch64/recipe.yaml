schema_version: 1

# TODO: hack to workaround https://github.com/conda-forge/rattler-build-conda-compat/issues/112
context:
  cdt_build_number: 111
  distro: centos7

package:
  name: gconf2-conda-aarch64
  version: 3.2.6

source:
  - url: https://vault.centos.org/altarch/7.9.2009/os/aarch64/Packages/GConf2-3.2.6-8.el7.aarch64.rpm
    sha256: 16d8de7fdc7176e1b0273e8d8225c69d5242c72bba1b1570edfaf28849ef2ff6
    target_directory: binary
  # - url: https://vault.centos.org/altarch/7.9.2009/os/Source/SPackages/GConf2-3.2.6-8.el7.src.rpm
  #   target_directory: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: distro != "centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - "*"

requirements:
  build:
    - libarchive
  host:
    - sysroot_linux-aarch64 2.17.*
  run:
    - sysroot_linux-aarch64 2.17.*

tests:
  - script:
      - echo "it installs!"

about:
  homepage: http://projects.gnome.org/gconf/
  license: LGPL-2.0-or-later AND GPL-2.0-or-later
  license_file: binary/usr/share/doc/GConf2-3.2.6/COPYING
  summary: (CDT) A process-transparent configuration system
  description: |
        GConf is a process-transparent configuration database API used to store user
        preferences. It has pluggable backends and features to support workgroup
        administration.

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
