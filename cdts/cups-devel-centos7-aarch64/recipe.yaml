schema_version: 1

package:
  name: cups-devel-conda-aarch64
  version: 1.6.3

source:
  - url: https://vault.centos.org/altarch/7.9.2009/os/aarch64/Packages/cups-devel-1.6.3-51.el7.aarch64.rpm
    sha256: aa2cd8a49f93163ae139dc37d0be4509dd74ff3098ac6dae0821e1dcdfce16e0
    target_directory: binary
    no_hoist: true
  # - url: https://vault.centos.org/altarch/7.9.2009/os/Source/SPackages/cups-1.6.3-51.el7.src.rpm
  #   no_hoist: true
  #   folder: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: "distro != "\centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - "*"

requirements:
  build:
    - cups-libs-conda-aarch64 ==1.6.3 *_{{ cdt_build_number|int + 1000 }}
  host:
    - cups-libs-conda-aarch64 ==1.6.3 *_{{ cdt_build_number|int + 1000 }}
    - sysroot_linux-aarch64 2.17.*
  run:
    - cups-libs-conda-aarch64 ==1.6.3 *_{{ cdt_build_number|int + 1000 }}
    - sysroot_linux-aarch64 2.17.*

tests:
  script:
    - "echo "it installs!""

about:
  license: LGPLv2
  license_file: {{ SRC_DIR }}/binary/LICENSE_NOT_FOUND
  summary: (CDT) CUPS printing system - development environment
  description: |
        CUPS printing system provides a portable printing layer for UNIX® operating
        systems. This is the development package for creating additional printer
        drivers, and other CUPS services.


  homepage: http://www.cups.org/

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
