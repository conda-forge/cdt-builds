schema_version: 1

package:
  name: rdma-core-conda-aarch64
  version: 22.4

source:
  - url: https://vault.centos.org/altarch/7.9.2009/os/aarch64/Packages/rdma-core-22.4-5.el7.aarch64.rpm
    sha256: 50754c50386e111904aa0d662f6392321c0e3dbd81c23bab58740c9b051c2963
    target_directory: binary
    no_hoist: true
  # - url: https://vault.centos.org/altarch/7.9.2009/os/Source/SPackages/rdma-core-22.4-5.el7.src.rpm
  #   no_hoist: true
  #   folder: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: "distro != "\centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - "*"

requirements:
  host:
    - sysroot_linux-aarch64 2.17.*
  run:
    - sysroot_linux-aarch64 2.17.*

tests:
  script:
    - "echo "it installs!""

about:
  license: GPLv2 or BSD
  license_file: {{ SRC_DIR }}/binary/usr/share/licenses/rdma-core-22.4/COPYING.md
  summary: (CDT) RDMA core userspace libraries and daemons
  description: |
        RDMA core userspace infrastructure and documentation, including initscripts,
        kernel driver-specific modprobe override configs, IPoIB network scripts,
        dracut rules, and the rdma-ndd utility.


  homepage: https://github.com/linux-rdma/rdma-core

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
