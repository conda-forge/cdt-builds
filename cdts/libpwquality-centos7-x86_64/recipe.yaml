schema_version: 1

# TODO: hack to workaround https://github.com/conda-forge/rattler-build-conda-compat/issues/112
context:
  cdt_build_number: 111
  distro: centos7

package:
  name: libpwquality-conda-x86_64
  version: 1.2.3

source:
  - url: https://vault.centos.org/7.9.2009/os/x86_64/Packages/libpwquality-1.2.3-5.el7.x86_64.rpm
    sha256: 4cab5d54e3baf5d94dc3f8bf92cef72215dcf3354903493bdd19fa02629bf385
    target_directory: binary
  # - url: https://vault.centos.org/7.9.2009/os/Source/SPackages/libpwquality-1.2.3-5.el7.src.rpm
  #   target_directory: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: distro != "centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - "*"

requirements:
  build:
    - cracklib-dicts-conda-x86_64 >=2.8 *_${{ cdt_build_number|int + 1000 }}
    - libarchive
  host:
    - cracklib-dicts-conda-x86_64 >=2.8 *_${{ cdt_build_number|int + 1000 }}
    - sysroot_linux-64 2.17.*
  run:
    - cracklib-dicts-conda-x86_64 >=2.8 *_${{ cdt_build_number|int + 1000 }}
    - sysroot_linux-64 2.17.*

tests:
  - script:
      - echo "it installs!"

about:
  homepage: https://github.com/libpwquality/libpwquality/
  license: LicenseRef-Callaway-BSD OR GPL-2.0-or-later
  license_file: binary/usr/share/doc/libpwquality-1.2.3/COPYING
  summary: (CDT) A library for password generation and password quality checking
  description: |
        This is a library for password quality checks and generation of random
        passwords that pass the checks. This library uses the cracklib and cracklib
        dictionaries to perform some of the checks.

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
