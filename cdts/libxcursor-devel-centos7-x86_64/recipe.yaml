schema_version: 1

# TODO: hack to workaround https://github.com/conda-forge/rattler-build-conda-compat/issues/112
context:
  cdt_build_number: 111
  distro: centos7

package:
  name: libxcursor-devel-conda-x86_64
  version: 1.1.15

source:
  - url: https://vault.centos.org/7.9.2009/os/x86_64/Packages/libXcursor-devel-1.1.15-1.el7.x86_64.rpm
    sha256: a9e9a0625e06ccc075cd84c7f6cb5d45233d709ceea21f706235bf9190146c12
    target_directory: binary
  # - url: https://vault.centos.org/7.9.2009/os/Source/SPackages/libXcursor-1.1.15-1.el7.src.rpm
  #   target_directory: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: distro != "centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - '*'

requirements:
  build:
    - libxcursor-conda-x86_64 ==1.1.15 *_${{ cdt_build_number|int + 1000 }}
    - libarchive
  host:
    - libxcursor-conda-x86_64 ==1.1.15 *_${{ cdt_build_number|int + 1000 }}
    - sysroot_linux-64 2.17.*
  run:
    - libxcursor-conda-x86_64 ==1.1.15 *_${{ cdt_build_number|int + 1000 }}
    - sysroot_linux-64 2.17.*

tests:
  - script:
      - echo "it installs!"

about:
  homepage: https://www.x.org
  license: MIT
  license_file: libxcursor-license
  summary: (CDT) Development files for libXcursor
  description: |
    libXcursor development package.

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
