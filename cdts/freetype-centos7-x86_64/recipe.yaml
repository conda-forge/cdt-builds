schema_version: 1

# TODO: hack to workaround https://github.com/conda-forge/rattler-build-conda-compat/issues/112
context:
  cdt_build_number: 111
  distro: centos7

package:
  name: freetype-conda-x86_64
  version: 2.8

source:
  - url: https://vault.centos.org/7.9.2009/os/x86_64/Packages/freetype-2.8-14.el7.x86_64.rpm
    sha256: 13f22ec33abf14d99dbdd456f1b2ac3b0ea84c1ceb756073a0df41de0de42b7a
    target_directory: binary
  # - url: https://vault.centos.org/7.9.2009/os/Source/SPackages/freetype-2.8-14.el7.src.rpm
  #   target_directory: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: distro != "centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - '*'

requirements:
  build:
    - libarchive
  host:
    - sysroot_linux-64 2.17.*
  run:
    - sysroot_linux-64 2.17.*

tests:
  - script:
      - echo "it installs!"

about:
  homepage: http://www.freetype.org
  license: ( FTL OR GPL-2.0-or-later ) AND LicenseRef-Callaway-BSD AND MIT AND LicenseRef-Callaway-Public-Domain AND zlib-acknowledgement
  license_file: freetype-license.txt
  summary: (CDT) A free and portable font rendering engine
  description: |
    The FreeType engine is a free and portable font rendering engine, developed to
    provide advanced font support for a variety of platforms and environments.
    FreeType is a library which can open and manages font files as well as
    efficiently load, hint and render individual glyphs. FreeType is not a font
    server or a complete text-rendering library.

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
