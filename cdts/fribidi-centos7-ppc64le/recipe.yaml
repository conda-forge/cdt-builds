schema_version: 1

# TODO: hack to workaround https://github.com/conda-forge/rattler-build-conda-compat/issues/112
context:
  cdt_build_number: 111
  distro: centos7

package:
  name: fribidi-conda-ppc64le
  version: 1.0.2

source:
  - url: https://vault.centos.org/altarch/7.9.2009/os/ppc64le/Packages/fribidi-1.0.2-1.el7_7.1.ppc64le.rpm
    sha256: 0ee910467ea7a92e5b5225757b8c6c0714c2057e5542c6b2104ce112bf04d2b8
    target_directory: binary
  # - url: https://vault.centos.org/altarch/7.9.2009/os/Source/SPackages/fribidi-1.0.2-1.el7_7.1.src.rpm
  #   target_directory: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: distro != "centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - "*"

requirements:
  build:
    - libarchive
  host:
    - sysroot_linux-ppc64le 2.17.*
  run:
    - sysroot_linux-ppc64le 2.17.*

tests:
  - script:
      - echo "it installs!"

about:
  homepage: https://github.com/fribidi/fribidi/
  license: LGPL-2.0-or-later AND LicenseRef-scancode-unicode-ucd
  license_file: binary/usr/share/doc/fribidi-1.0.2/COPYING
  summary: (CDT) Library implementing the Unicode Bidirectional Algorithm
  description: |
        A library to handle bidirectional scripts (for example Hebrew, Arabic), so
        that the display is done in the proper way; while the text data itself is
        always written in logical order.

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
