schema_version: 1

# TODO: hack to workaround https://github.com/conda-forge/rattler-build-conda-compat/issues/112
context:
  cdt_build_number: 111
  distro: centos7

package:
  name: libthai-conda-ppc64le
  version: 0.1.14

source:
  - url: https://vault.centos.org/altarch/7.9.2009/os/ppc64le/Packages/libthai-0.1.14-9.el7.ppc64le.rpm
    sha256: 5506f087b5fb256175ac377187341d08f712c55cc8e0bf68a989d78d05b4f4f4
    target_directory: binary
  # - url: https://vault.centos.org/altarch/7.9.2009/os/Source/SPackages/libthai-0.1.14-9.el7.src.rpm
  #   target_directory: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: distro != "centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - "*"

requirements:
  build:
    - libarchive
  host:
    - sysroot_linux-ppc64le 2.17.*
  run:
    - sysroot_linux-ppc64le 2.17.*

tests:
  - script:
      - echo "it installs!"

about:
  homepage: http://linux.thai.net
  license: LGPL-2.0-or-later
  license_file: binary/usr/share/doc/libthai-0.1.14/COPYING
  summary: (CDT) Thai language support routines
  description: |
        LibThai is a set of Thai language support routines aimed to ease developers'
        tasks to incorporate Thai language support in their applications. It includes
        important Thai-specific functions e.g. word breaking, input and output methods
        as well as basic character and string supports.

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
