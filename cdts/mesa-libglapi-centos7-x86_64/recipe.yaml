schema_version: 1

package:
  name: mesa-libglapi-conda-x86_64
  version: 18.3.4

source:
  - url: https://vault.centos.org/7.9.2009/os/x86_64/Packages/mesa-libglapi-18.3.4-10.el7.x86_64.rpm
    sha256: 40466132f3f6b62777ad27df7dc0060f99a362c55f00ed125d0f58437066a38f
    target_directory: binary
    no_hoist: true
  # - url: https://vault.centos.org/7.9.2009/os/Source/SPackages/mesa-18.3.4-10.el7.src.rpm
  #   no_hoist: true
  #   folder: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: "distro != "\centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - "*"

requirements:
  host:
    - sysroot_linux-64 2.17.*
  run:
    - sysroot_linux-64 2.17.*

tests:
  script:
    - "echo "it installs!""

about:
  license: MIT
  license_file: {{ SRC_DIR }}/binary/LICENSE_NOT_FOUND
  summary: (CDT) Mesa shared glapi
  description: |
        Mesa shared glapi


  homepage: http://www.mesa3d.org

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
