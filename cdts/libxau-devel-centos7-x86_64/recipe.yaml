schema_version: 1

package:
  name: libxau-devel-conda-x86_64
  version: 1.0.8

source:
  - url: https://vault.centos.org/7.9.2009/os/x86_64/Packages/libXau-devel-1.0.8-2.1.el7.x86_64.rpm
    sha256: 862b79ad1362233c09b639b175cd7a3ebffc9f64d2b428d06f995927b629dacc
    target_directory: binary
    no_hoist: true
  # - url: https://vault.centos.org/7.9.2009/os/Source/SPackages/libXau-1.0.8-2.1.el7.src.rpm
  #   no_hoist: true
  #   folder: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: "distro != "\centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - "*"

requirements:
  build:
    - libxau-conda-x86_64 ==1.0.8 *_{{ cdt_build_number|int + 1000 }}
  host:
    - libxau-conda-x86_64 ==1.0.8 *_{{ cdt_build_number|int + 1000 }}
    - sysroot_linux-64 2.17.*
  run:
    - libxau-conda-x86_64 ==1.0.8 *_{{ cdt_build_number|int + 1000 }}
    - sysroot_linux-64 2.17.*

tests:
  script:
    - "echo "it installs!""

about:
  license: MIT
  license_file: {{ SRC_DIR }}/binary/LICENSE_NOT_FOUND
  summary: (CDT) Development files for libXau
  description: |
        X.Org X11 libXau development package


  homepage: http://www.x.org

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
