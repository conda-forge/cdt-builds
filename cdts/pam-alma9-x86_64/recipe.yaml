schema_version: 1

# TODO: hack to workaround https://github.com/conda-forge/rattler-build-conda-compat/issues/112
context:
  cdt_build_number: 111
  distro: alma9

package:
  name: pam-conda-x86_64
  version: 1.5.1

source:
  - url: https://repo.almalinux.org/almalinux/9.7/BaseOS/x86_64/os/Packages/pam-1.5.1-26.el9_6.x86_64.rpm
    sha256: 132e962e69c73eb79668332a588e223a6c74fabe4a9486f1f8d95534c0d639c8
    target_directory: binary
  # - url: https://repo.almalinux.org/almalinux/9.7/BaseOS/Source/Packages/pam-1.5.1-26.el9_6.src.rpm
  #   target_directory: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: distro != "alma9"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - '*'

requirements:
  build:
    - audit-libs-conda-x86_64 >=1.0.8 *_${{ cdt_build_number|int + 1000 }}
    - libeconf-conda-x86_64 >=0.3.5 *_${{ cdt_build_number|int + 1000 }}
    - libpwquality-conda-x86_64 >=0.9.9 *_${{ cdt_build_number|int + 1000 }}
    - libselinux-conda-x86_64 >=1.33.2 *_${{ cdt_build_number|int + 1000 }}
    - libarchive
  host:
    - audit-libs-conda-x86_64 >=1.0.8 *_${{ cdt_build_number|int + 1000 }}
    - libeconf-conda-x86_64 >=0.3.5 *_${{ cdt_build_number|int + 1000 }}
    - libpwquality-conda-x86_64 >=0.9.9 *_${{ cdt_build_number|int + 1000 }}
    - libselinux-conda-x86_64 >=1.33.2 *_${{ cdt_build_number|int + 1000 }}
    - sysroot_linux-64 2.34.*
  run:
    - audit-libs-conda-x86_64 >=1.0.8 *_${{ cdt_build_number|int + 1000 }}
    - libeconf-conda-x86_64 >=0.3.5 *_${{ cdt_build_number|int + 1000 }}
    - libpwquality-conda-x86_64 >=0.9.9 *_${{ cdt_build_number|int + 1000 }}
    - libselinux-conda-x86_64 >=1.33.2 *_${{ cdt_build_number|int + 1000 }}
    - sysroot_linux-64 2.34.*
tests:
  - script:
      - echo "it installs!"

about:
  homepage: http://www.linux-pam.org/
  license: LicenseRef-Callaway-BSD AND GPL-2.0-or-later
  license_file: binary/usr/share/licenses/pam/Copyright
  summary: (CDT) An extensible library which provides authentication for applications
  description: |
    PAM (Pluggable Authentication Modules) is a system security tool that allows
    system administrators to set authentication policy without having to recompile
    programs that handle authentication.

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
