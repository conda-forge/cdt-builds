schema_version: 1

package:
  name: libglvnd-conda-aarch64
  version: 1.0.1

source:
  - url: https://vault.centos.org/altarch/7.9.2009/os/aarch64/Packages/libglvnd-1.0.1-0.8.git5baa1e5.el7.aarch64.rpm
    sha256: 58930bad0d7540669ffcd048b5010d04cb1db2b922b5289a92afe0caa15640f9
    target_directory: binary
    no_hoist: true
  # - url: https://vault.centos.org/altarch/7.9.2009/os/Source/SPackages/libglvnd-1.0.1-0.8.git5baa1e5.el7.src.rpm
  #   no_hoist: true
  #   folder: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: "distro != "\centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - "*"

requirements:
  host:
    - sysroot_linux-aarch64 2.17.*
  run:
    - sysroot_linux-aarch64 2.17.*

tests:
  script:
    - "echo "it installs!""

about:
  license: MIT
  license_file: {{ SRC_DIR }}/binary/LICENSE_NOT_FOUND
  summary: (CDT) The GL Vendor-Neutral Dispatch library
  description: |
        libglvnd is an implementation of the vendor-neutral dispatch layer for
        arbitrating OpenGL API calls between multiple vendors on a per-screen basis.


  homepage: https://github.com/NVIDIA/libglvnd

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
