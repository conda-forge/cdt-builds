schema_version: 1

package:
  name: libuuid-conda-aarch64
  version: 2.23.2

source:
  - url: https://vault.centos.org/altarch/7.9.2009/os/aarch64/Packages/libuuid-2.23.2-65.el7.aarch64.rpm
    sha256: 82892b803734ab60fa8e7a4e6abeabc80719edd2761ec64d50a677e95e770408
    target_directory: binary
    no_hoist: true
  # - url: https://vault.centos.org/altarch/7.9.2009/os/Source/SPackages/util-linux-2.23.2-65.el7.src.rpm
  #   no_hoist: true
  #   folder: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: "distro != "\centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - "*"

requirements:
  host:
    - sysroot_linux-aarch64 2.17.*
  run:
    - sysroot_linux-aarch64 2.17.*

tests:
  script:
    - "echo "it installs!""

about:
  license: BSD
  license_file: {{ SRC_DIR }}/binary/usr/share/doc/libuuid-2.23.2/COPYING
  summary: (CDT) Universally unique ID library
  description: |
        This is the universally unique ID library, part of util-linux.  The libuuid
        library generates and parses 128-bit universally unique id's (UUID's).  A UUID
        is an identifier that is unique across both space and time, with respect to
        the space of all UUIDs.  A UUID can be used for multiple purposes, from
        tagging objects with an extremely short lifetime, to reliably identifying very
        persistent objects across a network.  See also the "uuid" package, which is a
        separate implementation.


  homepage: http://en.wikipedia.org/wiki/Util-linux

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
