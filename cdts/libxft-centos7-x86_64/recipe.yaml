schema_version: 1

package:
  name: libxft-conda-x86_64
  version: 2.3.2

source:
  - url: https://vault.centos.org/7.9.2009/os/x86_64/Packages/libXft-2.3.2-2.el7.x86_64.rpm
    sha256: aca6be8d337c969a5d84b3af1180f06462cef3bb592b08eeb2eba9f384e796a1
    target_directory: binary
    no_hoist: true
  # - url: https://vault.centos.org/7.9.2009/os/Source/SPackages/libXft-2.3.2-2.el7.src.rpm
  #   no_hoist: true
  #   folder: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: "distro != "\centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - "*"

requirements:
  build:
    - fontconfig-conda-x86_64 >=2.2 *_{{ cdt_build_number|int + 1000 }}
  host:
    - fontconfig-conda-x86_64 >=2.2 *_{{ cdt_build_number|int + 1000 }}
    - sysroot_linux-64 2.17.*
  run:
    - fontconfig-conda-x86_64 >=2.2 *_{{ cdt_build_number|int + 1000 }}
    - sysroot_linux-64 2.17.*

tests:
  script:
    - "echo "it installs!""

about:
  license: MIT
  license_file: {{ SRC_DIR }}/binary/usr/share/doc/libXft-2.3.2/COPYING
  summary: (CDT) X.Org X11 libXft runtime library
  description: |
        X.Org X11 libXft runtime library


  homepage: http://www.x.org

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
