schema_version: 1

# TODO: hack to workaround https://github.com/conda-forge/rattler-build-conda-compat/issues/112
context:
  cdt_build_number: 111
  distro: centos7

package:
  name: libx11-common-conda-x86_64
  version: 1.6.7

source:
  - url: https://vault.centos.org/7.9.2009/os/x86_64/Packages/libX11-common-1.6.7-2.el7.noarch.rpm
    sha256: dc2895887d4354cff78b1992896dd6b925602a13134321b0be45551c022bc420
    target_directory: binary
  # - url: https://vault.centos.org/7.9.2009/os/Source/SPackages/libX11-1.6.7-2.el7.src.rpm
  #   target_directory: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: distro != "centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - "*"

requirements:
  build:
    - libarchive
  host:
    - sysroot_linux-64 2.17.*
  run:
    - sysroot_linux-64 2.17.*

tests:
  - script:
      - echo "it installs!"

about:
  homepage: http://www.x.org
  license: MIT
  license_file: binary/usr/share/doc/libX11-common-1.6.7/COPYING
  summary: (CDT) Common data for libX11
  description: |
        libX11 common data

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
