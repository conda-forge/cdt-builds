schema_version: 1

# TODO: hack to workaround https://github.com/conda-forge/rattler-build-conda-compat/issues/112
context:
  cdt_build_number: 111
  distro: centos7

package:
  name: cracklib-dicts-conda-x86_64
  version: 2.9.0

source:
  - url: https://vault.centos.org/7.9.2009/os/x86_64/Packages/cracklib-dicts-2.9.0-11.el7.x86_64.rpm
    sha256: 39edb2d55f639a5602b4663dc66b61af3fe8e2365dd823101ecb8aeaf543cf06
    target_directory: binary
  # - url: https://vault.centos.org/7.9.2009/os/Source/SPackages/cracklib-2.9.0-11.el7.src.rpm
  #   target_directory: source

build:
  # this skip is here because we need different package hashes per distro.
  # we therefore list all possible values in CBC and skip those we don't want;
  # use in a selector ensures that the `distro` variable shows up in the hash
  number: ${{ cdt_build_number|int + 1000 }}
  skip: distro != "centos7"
  noarch: generic
  prefix_detection:
    ignore_binary_files: false
  dynamic_linking:
    binary_relocation: false
    missing_dso_allowlist:
      - '*'

requirements:
  build:
    - cracklib-conda-x86_64 ==2.9.0 *_${{ cdt_build_number|int + 1000 }}
    - libarchive
  host:
    - cracklib-conda-x86_64 ==2.9.0 *_${{ cdt_build_number|int + 1000 }}
    - sysroot_linux-64 2.17.*
  run:
    - cracklib-conda-x86_64 ==2.9.0 *_${{ cdt_build_number|int + 1000 }}
    - sysroot_linux-64 2.17.*

tests:
  - script:
      - echo "it installs!"

about:
  homepage: http://sourceforge.net/projects/cracklib/
  license: LGPL-2.0-or-later
  license_file: cracklib-copying.lib
  summary: (CDT) The standard CrackLib dictionaries
  description: |
    The cracklib-dicts package includes the CrackLib dictionaries. CrackLib will
    need to use the dictionary appropriate to your system, which is normally put
    in /usr/share/dict/words. Cracklib-dicts also contains the utilities necessary
    for the creation of new dictionaries.  If you are installing CrackLib, you
    should also install cracklib-dicts.

extra:
  recipe-maintainers:
    - conda-forge/help-cdts
